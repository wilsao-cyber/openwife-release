server:
  host: "0.0.0.0"
  port: 8000
  debug: false

llm:
  provider: "ollama"
  base_url: "http://localhost:9090"
  model: "smart7"
  temperature: 0.7
  max_tokens: 2048
  api_key: ""

tts:
  provider: "voicebox"
  voicebox_api_url: "http://localhost:17493"
  voicebox_profile_id: "23bcfffa-6263-4b3a-852d-9fde25c3fd38"
  voicebox_horny_profile_id: "b595fd1c-a1b4-44f3-9b93-244338a884ac"
  model_path: "./models/tts/cosyvoice"
  voice_sample_path: "./voice_samples"
  sample_rate: 22050

stt:
  provider: "whisper"
  model: "medium"
  language: "auto"

email:
  provider: "gmail"
  credentials_path: "../config/credentials.json"
  token_path: "../config/gmail_token.json"
  refresh_interval: 300

calendar:
  provider: "google_calendar"
  credentials_path: "../config/credentials.json"
  token_path: "../config/calendar_token.json"
  refresh_interval: 60
  timezone: "Asia/Taipei"

web_search:
  provider: "searxng"
  base_url: "http://localhost:8080"

opencode:
  server_url: "http://localhost:4096"
  auto_start: true
  timeout: 600
  allowed_paths:
    - "./mobile_app"
    - "./server"

character:
  default_model_path: "./mobile_app/assets/models"
  animation_enabled: true
  vrm_support: true

vision:
  model: "llava"
  change_threshold: 0.3

languages:
  supported:
    - "zh-TW"
    - "ja"
    - "en"
  default: "zh-TW"

soul:
  soul_path: "./soul/SOUL.md"
  profile_path: "./soul/PROFILE.md"

memory:
  db_path: "./memory/memories.db"
  embedding_model: "paraphrase-multilingual-MiniLM-L12-v2"
  max_memories: 1000
  search_limit: 3
  use_embeddings: true

heartbeat:
  enabled: true
  config_path: "./heartbeat/HEARTBEAT.md"

mcp:
  servers: []
