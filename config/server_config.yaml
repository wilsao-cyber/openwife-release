server:
  host: "0.0.0.0"
  port: 8000
  debug: false

llm:
  provider: "ollama"
  base_url: "http://localhost:9090"
  model: "smart7"
  temperature: 0.7
  max_tokens: 2048
  api_key: ""
  fallback_provider: ""
  fallback_base_url: ""
  fallback_api_key: ""
  fallback_model: ""

tts:
  provider: "voicebox"
  voicebox_api_url: "http://localhost:17493"
  voicebox_profile_id: "dad0cb88-fa99-4e58-969d-e0bbeb80f34d"           # ayachi (RJ01175599)
  # voicebox_profile_id: "0ebc00bb-04ab-4b85-9937-5321777edbce"       # omote (RJ01212922)
  voicebox_horny_profile_id: "66d15d53-cf7a-4e04-a102-0280a03a0689"   # ayachi_horny (RJ01175599)
  # voicebox_horny_profile_id: "c69b1cee-d852-4c03-9162-ee02a3791968" # omote_horny (RJ01212922)
  voicebox_model_size: "1.7B"      # "1.7B" or "0.6B" — 0.6B is ~2x faster but lower quality
  voicebox_concurrency: 1           # sequential — Voicebox serializes GPU internally
  audio_fx_enabled: true             # emotion-based audio post-processing
  model_path: "./models/tts/cosyvoice"
  voice_sample_path: "./voice_samples"
  sample_rate: 22050

stt:
  provider: "sensevoice"
  model: "iic/SenseVoiceSmall"
  language: "auto"

email:
  provider: "gmail"
  credentials_path: "../config/credentials.json"
  token_path: "../config/gmail_token.json"
  refresh_interval: 300

calendar:
  provider: "google_calendar"
  credentials_path: "../config/credentials.json"
  token_path: "../config/calendar_token.json"
  refresh_interval: 60
  timezone: "Asia/Taipei"

web_search:
  provider: "searxng"
  base_url: "http://localhost:8080"
  brave_api_key: ""                    # Brave Search API fallback key

opencode:
  server_url: "http://localhost:4096"
  auto_start: true
  timeout: 600
  allowed_paths:
    - "./mobile_app"
    - "./server"

character:
  default_model_path: "./mobile_app/assets/models"
  animation_enabled: true
  vrm_support: true

vision:
  model: "llava"
  change_threshold: 0.3

languages:
  supported:
    - "zh-TW"
    - "ja"
    - "en"
  default: "zh-TW"

soul:
  soul_path: "./soul/SOUL.md"
  profile_path: "./soul/PROFILE.md"

memory:
  db_path: "./memory/memories.db"
  embedding_model: "paraphrase-multilingual-MiniLM-L12-v2"
  max_memories: 1000
  search_limit: 3
  use_embeddings: true

heartbeat:
  enabled: true
  config_path: "./heartbeat/HEARTBEAT.md"

mcp:
  servers: []
