name: ai_wife_app
description: AI Wife 3D Assistant App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  web_socket_channel: ^2.4.0
  provider: ^6.1.1
  flutter_tts: ^3.8.5
  speech_to_text: ^6.6.0
  file_picker: ^8.0.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  google_sign_in: ^6.2.1
  googleapis: ^13.0.0
  googleapis_auth: ^1.5.0
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  audioplayers: ^6.0.0
  intl: ^0.19.0
  table_calendar: ^3.1.2
  flutter_slidable: ^3.1.0
  flutter_local_notifications: ^17.0.0
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
    - assets/voice_samples/
