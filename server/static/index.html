<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Wife</title>
<style>
  /* ── Rose Dusk Theme ─────────────────────────────────────────────── */
  :root {
    --bg-primary: #1c1e2a;
    --bg-secondary: #2a2d3e;
    --bg-tertiary: #353849;
    --accent: #d4a5a5;
    --accent-light: #e6c4c0;
    --accent-muted: rgba(212, 165, 165, 0.15);
    --text-primary: #f2d7d5;
    --text-secondary: #a09aab;
    --text-muted: #6b6679;
    --glass: rgba(42, 45, 62, 0.5);
    --glass-border: rgba(212, 165, 165, 0.08);
    --glass-hover: rgba(42, 45, 62, 0.7);
    --user-bubble: linear-gradient(135deg, #3a2d3e, #2a2d3e);
    --ai-bubble: linear-gradient(135deg, #2a2d3e, #1c1e2a);
    --send-btn: linear-gradient(135deg, #d4a5a5, #e6c4c0);
    --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --radius-pill: 24px;
    --blur: blur(12px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: var(--bg-primary); color: var(--text-primary);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    position: relative;
  }

  /* ── Fullscreen VRM ──────────────────────────────────────────────── */
  #vrm-container {
    position: absolute; inset: 0; z-index: 0;
  }
  #vrm-container canvas {
    display: block; width: 100%; height: 100%; position: relative; z-index: 0;
    filter: contrast(1.12) saturate(1.35) brightness(1.05) sepia(0.08);
  }

  /* Gradient overlay for chat readability */
  #vrm-container::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(to left, rgba(28, 30, 42, 0.85) 0%, rgba(28, 30, 42, 0.4) 45%, transparent 70%);
    z-index: 1;
  }

  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: var(--accent); font-size: 16px; z-index: 5;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  #loading .spinner {
    width: 40px; height: 40px; border: 3px solid var(--accent-muted);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading.hidden { display: none; }
  #error {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #ff6b6b; font-size: 14px; text-align: center;
    display: none; padding: 20px; z-index: 5;
  }

  #greeting {
    position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg); padding: 10px 18px; color: var(--text-primary);
    font-size: 14px; max-width: 80%; text-align: center;
    backdrop-filter: var(--blur); display: none; z-index: 15;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  /* ── Floating Top Bar (Capsule) ──────────────────────────────────── */
  #top-bar {
    position: absolute; top: 12px; left: 12px;
    display: flex; gap: 6px; align-items: center; z-index: 20;
    padding: 6px 12px; background: var(--glass);
    backdrop-filter: var(--blur); border-radius: 20px;
    border: 1px solid var(--glass-border);
  }
  #top-bar .app-name {
    font-size: 13px; color: var(--accent-light); font-weight: 600; margin-right: 4px;
  }
  select {
    background: rgba(42, 45, 62, 0.8); color: #f2d7d5;
    border: 1px solid rgba(212, 165, 165, 0.2); padding: 4px 8px; border-radius: 10px; outline: none;
    font-size: 12px; cursor: pointer;
  }
  select:hover { background: rgba(42, 45, 62, 0.95); border-color: var(--accent); }
  select option { background: #2a2d3e; color: #f2d7d5; }
  #tts-toggle { cursor: pointer; font-size: 12px; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--glass-border); background: none; color: var(--text-secondary); margin-left: 2px; }
  #tts-toggle.on { color: var(--accent); border-color: var(--accent); }

  /* ── Chat Panel (Overlay Right) ──────────────────────────────────── */
  #chat-panel {
    position: absolute; top: 50px; bottom: 68px; right: 0;
    width: 55%; max-width: 450px; min-width: 280px;
    display: flex; flex-direction: column; z-index: 10;
  }
  #messages {
    flex: 1; overflow-y: auto; padding: 12px 16px; min-height: 0;
    display: flex; flex-direction: column; gap: 10px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; opacity: 0.5; }

  #chat-resize-handle { display: none; }

  #scroll-bottom-btn {
    position: absolute; bottom: 8px; right: 16px; z-index: 15;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--glass); backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); cursor: pointer;
    display: none; align-items: center; justify-content: center;
  }
  #scroll-bottom-btn svg { width: 16px; height: 16px; fill: var(--accent); }
  #scroll-bottom-btn.visible { display: flex; }
  #scroll-bottom-btn:hover { background: var(--glass-hover); }

  /* ── Chat Bubbles ────────────────────────────────────────────────── */
  .timing-badge { font-size: 9px; color: var(--text-muted); margin-top: 4px; }

  .msg {
    max-width: 85%; padding: 10px 14px; border-radius: var(--radius-lg);
    font-size: 13px; line-height: 1.6; word-wrap: break-word;
    box-shadow: var(--shadow); animation: msgAppear 0.2s ease;
  }
  @keyframes msgAppear { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user {
    align-self: flex-end; background: var(--user-bubble);
    color: var(--text-primary); border-bottom-right-radius: 4px;
  }
  .msg.ai {
    align-self: flex-start; background: var(--ai-bubble);
    color: var(--text-primary); border-bottom-left-radius: 4px;
    border-left: 2px solid var(--accent);
  }
  .msg.ai .emotion-tag { font-size: 10px; color: var(--accent); margin-bottom: 3px; font-weight: 500; }
  .msg.ai .timing-badge { font-size: 9px; color: var(--text-muted); margin-top: 6px; }

  .tts-btn { display: inline-block; cursor: pointer; font-size: 14px; margin-left: 6px; opacity: 0.5; transition: all 0.2s; user-select: none; }
  .tts-btn:hover { opacity: 1; transform: scale(1.1); }
  .tts-btn.playing { opacity: 1; animation: pulse 1s infinite; }

  .ja-toggle { display: inline-block; cursor: pointer; font-size: 11px; margin-left: 6px; opacity: 0.4; user-select: none; color: var(--accent); transition: opacity 0.2s; }
  .ja-toggle:hover { opacity: 1; }
  .ja-drawer { display: none; margin-top: 6px; padding: 8px 10px; background: var(--accent-muted); border-left: 2px solid var(--accent); border-radius: 4px; font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .ja-drawer.open { display: block; }

  .tts-loading { display: inline-block; font-size: 10px; color: var(--accent); margin-left: 6px; }
  .tts-loading::after { content: ''; animation: dots 1.2s steps(4) infinite; }
  @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }

  /* Media */
  .media-thumb { max-width: 280px; border-radius: var(--radius-sm); cursor: pointer; margin: 6px 0; transition: all 0.2s; box-shadow: var(--shadow); }
  .media-thumb:hover { opacity: 0.9; transform: scale(1.02); }
  .content-preview { display: inline-block; cursor: pointer; margin: 6px 0; padding: 8px 12px; background: var(--accent-muted); border-left: 2px solid var(--accent); border-radius: 6px; max-width: 280px; transition: background 0.2s; }
  .content-preview:hover { background: rgba(212, 165, 165, 0.2); }
  .content-preview-title { font-weight: 600; font-size: 12px; color: var(--accent); }
  .content-preview-snippet { font-size: 11px; color: var(--text-muted); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Lightbox */
  #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(28, 30, 42, 0.95); z-index: 9999; justify-content: center; align-items: center; }
  #lightbox.open { display: flex; }
  #lightbox-close { position: absolute; top: 16px; right: 24px; font-size: 28px; color: var(--accent); cursor: pointer; z-index: 10000; transition: color 0.2s; }
  #lightbox-close:hover { color: var(--accent-light); }
  #lightbox-img { max-width: 90%; max-height: 90%; object-fit: contain; transition: transform 0.2s; border-radius: var(--radius-sm); }
  #lightbox-richtext { max-width: 800px; max-height: 85vh; overflow-y: auto; background: var(--bg-secondary); color: var(--text-primary); padding: 24px; border-radius: var(--radius-md); font-size: 14px; line-height: 1.7; }
  #lightbox-nav { position: absolute; bottom: 20px; color: var(--text-secondary); font-size: 13px; }
  .lb-arrow { position: absolute; top: 50%; font-size: 32px; color: var(--accent); cursor: pointer; padding: 12px; user-select: none; transition: color 0.2s; }
  .lb-arrow:hover { color: var(--accent-light); }
  #lb-prev { left: 16px; }
  #lb-next { right: 16px; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .typing-indicator { display: inline-flex; gap: 4px; padding: 4px 0; }
  .typing-indicator span { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); opacity: 0.4; animation: blink 1.4s infinite both; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.4} 40%{opacity:1} }

  .msg.notice { align-self: center; background: var(--accent-muted); color: var(--accent); font-size: 11px; border: 1px dashed rgba(212, 165, 165, 0.2); max-width: 90%; text-align: center; }
  .msg.error { align-self: center; background: rgba(255, 100, 100, 0.1); color: #ff8a8a; font-size: 11px; }

  /* Plan card */
  .plan-card {
    background: var(--glass); backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); border-left: 2px solid var(--accent);
    border-radius: var(--radius-sm); padding: 10px; margin-top: 6px; font-size: 12px; color: var(--text-primary);
  }
  .plan-actions { display: flex; gap: 8px; margin-top: 8px; }
  .plan-actions button { padding: 5px 14px; border: none; border-radius: var(--radius-pill); cursor: pointer; color: white; font-size: 12px; transition: transform 0.15s; }
  .plan-actions button:hover { transform: scale(1.05); }
  .btn-confirm { background: linear-gradient(135deg, #5a9e6f, #4a8e5f); }
  .btn-deny { background: linear-gradient(135deg, #c06060, #a04040); }

  .tool-card {
    background: var(--bg-primary); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); padding: 0; margin-top: 6px; font-size: 11px; overflow: hidden;
  }
  .tool-header { padding: 6px 8px; background: var(--accent-muted); cursor: pointer; color: var(--text-secondary); }
  .tool-body { padding: 8px; display: none; color: var(--text-muted); border-top: 1px solid var(--glass-border); white-space: pre-wrap; word-break: break-all; max-height: 150px; overflow-y: auto; }
  .tool-card.expanded .tool-body { display: block; }

  /* ── Floating Input Bar ──────────────────────────────────────────── */
  #input-bar {
    position: absolute; bottom: 12px; left: 12px; right: 12px; z-index: 20;
    display: flex; gap: 8px; padding: 8px 14px; align-items: center;
    background: var(--glass); backdrop-filter: var(--blur);
    border-radius: var(--radius-pill); border: 1px solid var(--glass-border);
  }
  #settings-btn { background: none; border: none; font-size: 18px; cursor: pointer; opacity: 0.5; transition: opacity 0.2s; }
  #settings-btn:hover { opacity: 1; }
  #input-bar input {
    flex: 1; padding: 8px 12px; border-radius: var(--radius-pill);
    border: none; background: transparent;
    color: var(--text-primary); font-size: 13px; outline: none;
  }
  #input-bar input::placeholder { color: var(--text-muted); }
  #input-bar button#send-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--send-btn); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(212, 165, 165, 0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #input-bar button#send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(212, 165, 165, 0.4); }
  #input-bar button#send-btn svg { width: 16px; height: 16px; fill: var(--bg-primary); }

  /* ── Settings Modal ──────────────────────────────────────────────── */
  #settings-modal {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(28, 30, 42, 0.8); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  #settings-modal.hidden { display: none; }
  .modal-content {
    background: var(--bg-secondary); width: 90%; max-width: 500px; height: 80%;
    border-radius: var(--radius-md); border: 1px solid var(--glass-border);
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: var(--shadow-lg);
  }
  .modal-header { padding: 16px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
  .modal-header h2 { font-size: 16px; color: var(--accent); font-weight: 600; }
  #close-settings { background: none; border: none; color: var(--text-secondary); font-size: 18px; cursor: pointer; }
  .tabs { display: flex; gap: 4px; padding: 8px 12px; }
  .tab-btn { flex: 1; padding: 8px; border: none; background: none; color: var(--text-muted); cursor: pointer; font-size: 12px; border-radius: 10px; transition: all 0.2s; }
  .tab-btn.active { color: var(--accent); background: var(--accent-muted); }
  .tab-btn:hover { color: var(--text-primary); }
  .tab-body { flex: 1; padding: 16px; overflow-y: auto; display: none; }
  .tab-body.active { display: block; }

  /* ── Setup Screen ────────────────────────────────────────────────── */
  #setup-screen {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: linear-gradient(135deg, #1c1e2a 0%, #2a2d3e 50%, #1c1e2a 100%);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  #setup-screen.hidden { opacity: 0; pointer-events: none; transform: scale(1.03); }

  .setup-card {
    background: rgba(42, 45, 62, 0.8); backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); border-radius: 20px;
    padding: 32px; width: 90%; max-width: 420px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .setup-title { text-align: center; font-size: 26px; color: var(--accent-light); margin-bottom: 4px; font-weight: 300; letter-spacing: 2px; }
  .setup-subtitle { text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 28px; }
  .setup-field { margin-bottom: 16px; }
  .setup-field label { display: block; font-size: 12px; color: var(--accent); margin-bottom: 6px; font-weight: 500; }
  .setup-field select, .setup-field input {
    width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--glass-border); background: rgba(28, 30, 42, 0.6);
    color: var(--text-primary); font-size: 13px; outline: none; transition: border-color 0.2s;
  }
  .setup-field select:focus, .setup-field input:focus { border-color: var(--accent); }

  .test-btn {
    width: 100%; padding: 12px; border-radius: var(--radius-sm); border: none;
    background: var(--send-btn); color: var(--bg-primary); font-size: 14px; cursor: pointer;
    font-weight: 600; margin-bottom: 16px; transition: transform 0.15s, box-shadow 0.15s;
  }
  .test-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .test-btn:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 4px 16px rgba(212, 165, 165, 0.3); }

  .test-results { margin-bottom: 16px; }
  .test-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px; color: var(--text-secondary); }
  .test-item .status {
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: bold;
  }
  .test-item .status.ok { background: #5a9e6f; color: white; }
  .test-item .status.fail { background: #c06060; color: white; }
  .test-item .status.pending { background: var(--bg-tertiary); color: var(--text-muted); }
  .test-item .status.testing { background: var(--accent); color: var(--bg-primary); animation: pulse 1s infinite; }

  .enter-btn {
    width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none;
    background: linear-gradient(135deg, #5a9e6f, #4a8e5f); color: white;
    font-size: 15px; cursor: pointer; font-weight: 600;
    opacity: 0.3; pointer-events: none; transition: all 0.3s;
  }
  .enter-btn.ready { opacity: 1; pointer-events: auto; }
  .enter-btn:hover { transform: scale(1.02); box-shadow: 0 4px 16px rgba(90, 158, 111, 0.3); }

  .setup-loading { text-align: center; padding: 20px; color: var(--accent); }
  .setup-loading .spinner {
    width: 32px; height: 32px; border: 3px solid var(--accent-muted);
    border-top-color: var(--accent); border-radius: 50%; margin: 0 auto 12px;
    animation: spin 0.8s linear infinite;
  }

  /* Toast */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--glass); backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); border-radius: var(--radius-pill);
    padding: 10px 20px; color: var(--text-primary);
    font-size: 13px; z-index: 2000; opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  #toast.show { opacity: 1; }

  /* Model switch overlay */
  #model-switch-overlay {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(28, 30, 42, 0.8); backdrop-filter: blur(4px);
    z-index: 999; display: none;
    align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  }
  #model-switch-overlay.show { display: flex; }
  #model-switch-overlay span { color: #FF69B4; font-size: 14px; }
  .tabs { display: flex; background: #0f3460; }
  .tab-btn { flex: 1; padding: 10px; border: none; background: none; color: #aaa; cursor: pointer; }
  .tab-btn.active { color: #FF69B4; border-bottom: 2px solid #FF69B4; background: rgba(255,105,180,0.1); }
  .tab-body { flex: 1; padding: 16px; overflow-y: auto; display: none; }
  .tab-body.active { display: block; }
  
  #soul-editor { width: 100%; height: 85%; background: #1a1a2e; color: #eee; border: 1px solid #555; padding: 8px; border-radius: 6px; font-family: monospace; resize: none; }
  #save-soul-btn { margin-top: 10px; width: 100%; padding: 10px; background: #FF69B4; color: white; border: none; border-radius: 6px; cursor: pointer; }
  
  .memory-item, .hb-item { padding: 10px; background: #1a1a2e; margin-bottom: 8px; border-radius: 6px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: flex-start; }
  .hb-item .info { flex: 1; }
  .hb-item .cron { color: #FF69B4; font-family: monospace; font-size: 12px; }
  .hb-item .action { font-size: 14px; margin-top: 4px; color: #eee; }
  .hb-item button, .memory-item button { background: #f44336; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .hb-item button.btn-toggle { background: #555; }
  .hb-item button.btn-toggle.enabled { background: #4CAF50; }
</style>
</head>
<body>

<div id="vrm-container">
  <div id="top-bar">
    <span class="app-name">🌸 小愛</span>
    <select id="mode-selector">
      <option value="auto">自動</option>
      <option value="chat">聊天</option>
      <option value="assist">協助</option>
    </select>
    <select id="lang-selector">
      <option value="zh-TW">繁體中文</option>
      <option value="ja">日本語</option>
      <option value="en">English</option>
    </select>
    <button id="tts-toggle" class="on" title="語音開關">🔊</button>
    <select id="scene-selector" title="切換場景">
      <option value="home">🏠 居家</option>
      <option value="sakura">🌸 櫻花</option>
      <option value="fantasy">✨ 奇幻</option>
      <option value="night">🌃 夜景</option>
    </select>
    <span id="model-display" style="font-size:11px;color:var(--text-muted);padding:2px 8px;background:var(--accent-muted);border-radius:10px;cursor:default;" title="在設定中切換模型">📡</span>
  </div>
  <div id="loading"><div class="spinner"></div><span>Loading model...</span></div>
  <div id="error"></div>
  <div id="greeting"></div>
</div>

<div id="chat-panel">
  <div id="chat-resize-handle"></div>
  <div id="messages"></div>
  <button id="scroll-bottom-btn" title="Scroll to bottom">
    <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
  </button>
  <div id="input-bar">
    <button id="settings-btn" title="Settings">⚙️</button>

{

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/OrbitControls.js';
import { GLTFLoader } from 'three/addons/GLTFLoader.js';
import { FBXLoader } from 'three/addons/FBXLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

// ── Mixamo→VRM Bone Mapping ────────────────────────────────────────
const MIXAMO_VRM_MAP = {
  mixamorigHips: 'hips', mixamorigSpine: 'spine', mixamorigSpine1: 'chest',
  mixamorigSpine2: 'upperChest', mixamorigNeck: 'neck', mixamorigHead: 'head',
  mixamorigLeftShoulder: 'leftShoulder', mixamorigLeftArm: 'leftUpperArm',
  mixamorigLeftForeArm: 'leftLowerArm', mixamorigLeftHand: 'leftHand',
  mixamorigLeftHandThumb1: 'leftThumbMetacarpal', mixamorigLeftHandThumb2: 'leftThumbProximal',
  mixamorigLeftHandThumb3: 'leftThumbDistal', mixamorigLeftHandIndex1: 'leftIndexProximal',
  mixamorigLeftHandIndex2: 'leftIndexIntermediate', mixamorigLeftHandIndex3: 'leftIndexDistal',
  mixamorigLeftHandMiddle1: 'leftMiddleProximal', mixamorigLeftHandMiddle2: 'leftMiddleIntermediate',
  mixamorigLeftHandMiddle3: 'leftMiddleDistal', mixamorigLeftHandRing1: 'leftRingProximal',
  mixamorigLeftHandRing2: 'leftRingIntermediate', mixamorigLeftHandRing3: 'leftRingDistal',
  mixamorigLeftHandPinky1: 'leftLittleProximal', mixamorigLeftHandPinky2: 'leftLittleIntermediate',
  mixamorigLeftHandPinky3: 'leftLittleDistal',
  mixamorigRightShoulder: 'rightShoulder', mixamorigRightArm: 'rightUpperArm',
  mixamorigRightForeArm: 'rightLowerArm', mixamorigRightHand: 'rightHand',
  mixamorigRightHandThumb1: 'rightThumbMetacarpal', mixamorigRightHandThumb2: 'rightThumbProximal',
  mixamorigRightHandThumb3: 'rightThumbDistal', mixamorigRightHandIndex1: 'rightIndexProximal',
  mixamorigRightHandIndex2: 'rightIndexIntermediate', mixamorigRightHandIndex3: 'rightIndexDistal',
  mixamorigRightHandMiddle1: 'rightMiddleProximal', mixamorigRightHandMiddle2: 'rightMiddleIntermediate',
  mixamorigRightHandMiddle3: 'rightMiddleDistal', mixamorigRightHandRing1: 'rightRingProximal',
  mixamorigRightHandRing2: 'rightRingIntermediate', mixamorigRightHandRing3: 'rightRingDistal',
  mixamorigRightHandPinky1: 'rightLittleProximal', mixamorigRightHandPinky2: 'rightLittleIntermediate',
  mixamorigRightHandPinky3: 'rightLittleDistal',
  mixamorigLeftUpLeg: 'leftUpperLeg', mixamorigLeftLeg: 'leftLowerLeg',
  mixamorigLeftFoot: 'leftFoot', mixamorigLeftToeBase: 'leftToes',
  mixamorigRightUpLeg: 'rightUpperLeg', mixamorigRightLeg: 'rightLowerLeg',
  mixamorigRightFoot: 'rightFoot', mixamorigRightToeBase: 'rightToes',
};

function retargetMixamoClip(clip, fbxRoot, vrm, name) {
  const tracks = [];
  const restRotInv = new THREE.Quaternion();
  const parentRestWorldRot = new THREE.Quaternion();
  const q = new THREE.Quaternion();

  const hipsNode = fbxRoot.getObjectByName('mixamorigHips');
  const motionHipsY = hipsNode ? hipsNode.position.y : 1;
  const vrmHipsY = vrm.humanoid.normalizedRestPose.hips?.position?.[1] ?? 1;
  const hipsScale = vrmHipsY / motionHipsY;

  for (const track of clip.tracks) {
    const [mixName, prop] = track.name.split('.');
    const vrmBone = MIXAMO_VRM_MAP[mixName];
    if (!vrmBone) continue;

    const vrmNode = vrm.humanoid.getNormalizedBoneNode(vrmBone);
    if (!vrmNode) continue;

    const mixNode = fbxRoot.getObjectByName(mixName);
    if (!mixNode?.parent) continue;

    mixNode.getWorldQuaternion(restRotInv).invert();
    mixNode.parent.getWorldQuaternion(parentRestWorldRot);

    if (track instanceof THREE.QuaternionKeyframeTrack) {
      const values = new Float32Array(track.values.length);
      for (let i = 0; i < track.values.length; i += 4) {
        q.fromArray(track.values, i)
          .premultiply(parentRestWorldRot)
          .multiply(restRotInv);
        q.toArray(values, i);
      }
      tracks.push(new THREE.QuaternionKeyframeTrack(
        `${vrmNode.name}.${prop}`, track.times, values
      ));
    } else if (track instanceof THREE.VectorKeyframeTrack) {
      const values = new Float32Array(track.values.length);
      for (let i = 0; i < track.values.length; i++) values[i] = track.values[i] * hipsScale;
      tracks.push(new THREE.VectorKeyframeTrack(
        `${vrmNode.name}.${prop}`, track.times, values
      ));
    }
  }
  return new THREE.AnimationClip(name, clip.duration, tracks);
}

// ── Animation Controller ───────────────────────────────────────────
const CROSSFADE = 0.3;

class AnimController {
  constructor(vrm) {
    this.vrm = vrm;
    this.mixer = new THREE.AnimationMixer(vrm.scene);
    this.actions = new Map();
    this.entries = new Map();
    this.actionToId = new Map();
    this.currentAction = null;
    this.current = '';
    this.defaultId = '';

    this.mixer.addEventListener('finished', (e) => {
      const id = this.actionToId.get(e.action);
      if (!id) return;
      const entry = this.entries.get(id);
      const fallback = entry?.autoReturnTo;
      if (fallback && fallback !== this.current) this.play(fallback);
      else if (this.defaultId) this.play(this.defaultId);
    });
  }

  async loadAll(entries) {
    const fbxLoader = new FBXLoader();
    for (const entry of entries) {
      try {
        const url = `./static/animations/${entry.file}`;
        const fbx = await fbxLoader.loadAsync(url);
        const rawClip = fbx.animations.find(c => c.tracks.length > 0);
        if (!rawClip) continue;

        const clip = retargetMixamoClip(rawClip, fbx, this.vrm, entry.id);
        const action = this.mixer.clipAction(clip);
        const loop = entry.loop ?? true;
        action.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, loop ? Infinity : 1);
        if (!loop) action.clampWhenFinished = true;

        this.entries.set(entry.id, entry);
        this.actions.set(entry.id, action);
        this.actionToId.set(action, entry.id);
      } catch (err) {
        console.warn(`Failed to load animation ${entry.id}:`, err);
      }
    }
    if (entries.length > 0) this.defaultId = entries[0].id;
  }

  play(id) {
    const next = this.actions.get(id);
    if (!next || id === this.current) return;

    const entry = this.entries.get(id);
    const loop = entry?.loop ?? true;
    next.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, loop ? Infinity : 1);
    next.clampWhenFinished = !loop;

    if (this.currentAction) this.currentAction.fadeOut(CROSSFADE);
    next.reset().fadeIn(CROSSFADE).play();
    this.currentAction = next;
    this.current = id;
  }

  update(delta) { this.mixer.update(delta); }
}

// ── Scene Setup ────────────────────────────────────────────────────
const container = document.getElementById('vrm-container');
const loadingEl = document.getElementById('loading');
const errorEl = document.getElementById('error');

let scene, camera, renderer, controls, clock;
let currentVrm = null;
let animController = null;
let nextBlinkTime = 0, blinkEndTime = 0;

// ── Scene Themes ────────────────────────────────────────────────────
const SCENE_THEMES = {
  home: {
    name: '🏠 居家',
    gradient: 'radial-gradient(ellipse at 50% 30%, #3a2a20 0%, #2a1f18 40%, #1a1510 100%)',
    ambient: 0xffe8d0, ambientIntensity: 1.5,
    dir: 0xffd4a0, dirIntensity: 1.5, dirPos: [1, 2, 1],
    toneMappingExposure: 1.6,
  },
  sakura: {
    name: '🌸 櫻花',
    gradient: 'radial-gradient(ellipse at 50% 20%, #3a2535 0%, #2a1a25 40%, #1a1018 100%)',
    ambient: 0xffd0e0, ambientIntensity: 1.6,
    dir: 0xffe0f0, dirIntensity: 1.5, dirPos: [0.5, 3, 1],
    toneMappingExposure: 1.7,
  },
  fantasy: {
    name: '✨ 奇幻',
    gradient: 'radial-gradient(ellipse at 50% 40%, #1a1a38 0%, #12122a 40%, #0a0a1a 100%)',
    ambient: 0xc0c0ff, ambientIntensity: 1.3,
    dir: 0xa0a0ff, dirIntensity: 1.5, dirPos: [0, 3, 0.5],
    toneMappingExposure: 1.4,
  },
  night: {
    name: '🌃 夜景',
    gradient: 'radial-gradient(ellipse at 50% 60%, #1a1e2a 0%, #0f1218 50%, #080a10 100%)',
    ambient: 0x8090b0, ambientIntensity: 1.0,
    dir: 0xffa040, dirIntensity: 1.2, dirPos: [-1, 1.5, 2],
    toneMappingExposure: 1.3,
  },
};
var currentSceneTheme = 'home';
var ambientLight, dirLight;

function applySceneTheme(themeName) {
  const theme = SCENE_THEMES[themeName];
  if (!theme) return;
  currentSceneTheme = themeName;
  // CSS gradient background behind canvas
  container.style.background = theme.gradient;
  // Three.js lighting
  if (ambientLight) {
    ambientLight.color.setHex(theme.ambient);
    ambientLight.intensity = theme.ambientIntensity;
  }
  if (dirLight) {
    dirLight.color.setHex(theme.dir);
    dirLight.intensity = theme.dirIntensity;
    dirLight.position.set(...theme.dirPos);
  }
  if (renderer) {
    renderer.toneMappingExposure = theme.toneMappingExposure;
  }
  localStorage.setItem('ai-wife-scene', themeName);
}

function initScene() {
  clock = new THREE.Clock();
  scene = new THREE.Scene();

  const aspect = container.clientWidth / container.clientHeight;
  camera = new THREE.PerspectiveCamera(30, aspect, 0.1, 100);
  camera.position.set(0, 1.3, 2.5);

  renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  container.insertBefore(renderer.domElement, container.firstChild);

  // Ambient — warm skin-friendly fill
  ambientLight = new THREE.AmbientLight(0xffd8c0, 1.2);
  scene.add(ambientLight);

  // Key light — warm peach directional from front-right (skin tone)
  dirLight = new THREE.DirectionalLight(0xffd0b0, 1.5);
  dirLight.position.set(1, 2, 1);
  scene.add(dirLight);

  // Main spotlight — warm focused light, simulates stage key light
  const spotMain = new THREE.SpotLight(0xffe0c8, 3.5, 12, Math.PI / 5, 0.4, 0.5);
  spotMain.position.set(0, 3.5, 3);
  spotMain.target.position.set(0, 1.0, 0);
  scene.add(spotMain);
  scene.add(spotMain.target);

  // Face fill — warm peach from front-below for healthy skin glow
  const faceFill = new THREE.PointLight(0xffccaa, 2.0, 5, 1);
  faceFill.position.set(0, 0.8, 2);
  scene.add(faceFill);

  // Rim light left — warm pink/salmon edge highlight
  const rimLeft = new THREE.DirectionalLight(0xffa080, 1.0);
  rimLeft.position.set(-2, 1.5, -1);
  scene.add(rimLeft);

  // Rim light right — subtle warm purple edge
  const rimRight = new THREE.DirectionalLight(0xd0a0c0, 0.6);
  rimRight.position.set(2, 1.5, -1);
  scene.add(rimRight);

  // Top hair light — warm highlight
  const hairLight = new THREE.PointLight(0xffeedd, 1.2, 4, 1);
  hairLight.position.set(0, 3, 0);
  scene.add(hairLight);

  // Apply saved or default scene theme
  const savedScene = localStorage.getItem('ai-wife-scene') || 'home';
  applySceneTheme(savedScene);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 1.0, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  controls.minDistance = 1;
  controls.maxDistance = 5;
  controls.update();

  window.addEventListener('resize', () => {
    const w = container.clientWidth, h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
}

async function loadModel(url) {
  loadingEl.classList.remove('hidden');
  if (currentVrm) { scene.remove(currentVrm.scene); currentVrm = null; animController = null; }

  const loader = new GLTFLoader();
  loader.register(p => new VRMLoaderPlugin(p));

  try {
    const gltf = await loader.loadAsync(url);
    const vrm = gltf.userData.vrm;
    if (!vrm) { showError('No VRM data found'); return; }
    VRMUtils.rotateVRM0(vrm);
    currentVrm = vrm;
    scene.add(vrm.scene);

    // Auto-center camera
    const box = new THREE.Box3().setFromObject(vrm.scene);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    controls.target.set(center.x, center.y, center.z);
    camera.position.set(center.x, center.y + 0.1, center.z + size.y * 1.2);
    controls.update();

    loadingEl.querySelector('span').textContent = 'Loading animations...';

    // Load animations from registry
    try {
      const res = await fetch('./static/animations/registry.json');
      const entries = await res.json();
      animController = new AnimController(vrm);
      await animController.loadAll(entries);
      animController.play('idle');
      console.log('Animations loaded:', [...animController.actions.keys()]);
    } catch (err) {
      console.warn('Animation load failed, using procedural idle:', err);
    }

    loadingEl.classList.add('hidden');
    nextBlinkTime = clock.getElapsedTime() + 1;
  } catch (err) {
    showError('Failed to load: ' + (err.message || err));
  }
}

function showError(msg) {
  loadingEl.classList.add('hidden');
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
}

const lookAtTarget = new THREE.Vector3(0, 1.3, 10);

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  if (currentVrm) {
    // Use FBX animation if available, else fallback to procedural breathing
    if (animController) {
      animController.update(delta);
    } else if (currentVrm.humanoid) {
      const t = clock.getElapsedTime();
      const breath = Math.sin(t * 0.8) * 0.04;
      const sway = Math.sin(t * 0.3) * 0.015;
      const chest = currentVrm.humanoid.getNormalizedBoneNode('chest');
      const spine = currentVrm.humanoid.getNormalizedBoneNode('spine');
      const head = currentVrm.humanoid.getNormalizedBoneNode('head');
      if (chest) { chest.rotation.x = breath; chest.rotation.z = Math.sin(t * 0.25) * 0.005; }
      if (spine) { spine.rotation.x = breath * 0.6; spine.rotation.z = sway; }
      if (head) { head.rotation.x = Math.sin(t * 0.5) * 0.02; head.rotation.z = Math.sin(t * 0.4) * 0.01; }
    }

    // Blink
    if (currentVrm.expressionManager) {
      const t = clock.getElapsedTime();
      if (t >= blinkEndTime && t >= nextBlinkTime) {
        currentVrm.expressionManager.setValue('blink', 1.0);
        blinkEndTime = t + 0.15;
        nextBlinkTime = t + 2 + Math.random() * 4;
      } else if (t >= blinkEndTime) {
        currentVrm.expressionManager.setValue('blink', 0);
      }
    }

    if (currentVrm.lookAt) currentVrm.lookAt.lookAt(lookAtTarget);
    if (currentVrm.expressionManager) currentVrm.expressionManager.update();
    currentVrm.update(delta);
  }

  controls.update();
  renderer.render(scene, camera);
}

const emotionToExpression = {
  happy: 'happy', sad: 'sad', angry: 'angry',
  surprised: 'surprised', relaxed: 'relaxed', neutral: 'neutral'
};

const emotionToAnim = {
  happy: 'wave', surprised: 'wave', neutral: 'idle',
  sad: 'idle', angry: 'idle', relaxed: 'idle',
  thinking: 'think'
};

function setEmotion(emotion) {
  if (!currentVrm || !currentVrm.expressionManager) return;
  // Reset all expressions
  for (const expr of currentVrm.expressionManager.expressions) {
    currentVrm.expressionManager.setValue(expr.expressionName, 0);
  }
  const name = emotionToExpression[emotion] || 'neutral';
  if (name !== 'neutral') {
    currentVrm.expressionManager.setValue(name, 1.0);
  }
  // Play matching animation
  if (animController) {
    const anim = emotionToAnim[emotion] || 'idle';
    if (animController.actions.has(anim)) {
      animController.play(anim);
    }
  }
}

function uuidv4() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

  if (!ttsEnabled && currentAudio) { stopTTS(); }

async function playTTS(text, emotion = 'neutral') {
  try {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
    const cleanText = text.replace(/\[emotion:\w+\]/g, '').trim();
    if (!cleanText) return null;

    const resp = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: cleanText, language: langSel.value, emotion }),
    });
    if (!resp.ok) return null;

    const data = await resp.json();
    const audioResp = await fetch(data.audio_url);
    const blob = await audioResp.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.play();
    isPlaying = true;
    currentAudio.onended = () => { isPlaying = false; currentAudio = null; };
    return data.ja_text || null;
  } catch (e) {
    console.warn('TTS playback failed:', e);
    return null;
  }
}

function stopTTS() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
    isPlaying = false;
  }
}

// ── SSE Consumption ──────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  sendBtn.disabled = true;

  addMessageObj('user', `<span>${text}</span>`, 'user');

  if (animController && animController.actions.has('think')) {
    animController.play('think');
  }

  const aiDiv = document.createElement('div');
  aiDiv.className = 'msg ai';
  const typingEl = document.createElement('div');
  typingEl.className = 'typing-indicator';
  typingEl.innerHTML = '<span></span><span></span><span></span>';
  aiDiv.appendChild(typingEl);
  const aiSpan = document.createElement('span');
  aiSpan.style.display = 'none';
  aiDiv.appendChild(aiSpan);
  messagesEl.appendChild(aiDiv);
  scrollToBottom();

  let typingRemoved = false;
  function removeTyping() {
    if (!typingRemoved) { typingEl.remove(); aiSpan.style.display = ''; typingRemoved = true; }
  }

  // Track state
  let fullText = '';
  let activePlanCard = null;
  const startTime = performance.now();
  let firstChunkTime = null;

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        language: langSel.value,
        mode_override: modeSel.value === 'auto' ? null : modeSel.value,
        client_id: CLIENT_ID
      })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // incomplete line back to buffer

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const jsonStr = line.slice(6).trim();
        if (!jsonStr) continue;

        try {
          const evt = JSON.parse(jsonStr);

          switch (evt.type) {
            case 'mode_change':
              addMessageObj('sys', `⚙️ 模式: ${evt.mode === 'assist' ? '協助' : '聊天'}`, 'notice');
              break;
            
            case 'notice':
              removeTyping();
              addMessageObj('sys', evt.text, 'notice');
              break;

            case 'chunk':
              removeTyping();
              if (!firstChunkTime) firstChunkTime = performance.now();
              fullText += evt.data;
              aiSpan.textContent = fullText.replace(/\[emotion:\w+\]/g, '');
              scrollToBottom();
              break;

            case 'plan':
              removeTyping();
              activePlanCard = document.createElement('div');
              activePlanCard.className = 'plan-card';
              activePlanCard.innerHTML = `
                <div><strong>提議計畫:</strong><br>${(evt.description || '').replace(/\n/g, '<br>')}</div>
                <div class="plan-actions">
                  <button class="btn-confirm">✅ 授權執行</button>
                  <button class="btn-deny">❌ 拒絕</button>
                </div>
              `;
              activePlanCard.querySelector('.btn-confirm').onclick = async () => {
                activePlanCard.querySelectorAll('button').forEach(b => b.disabled = true);
                activePlanCard.querySelector('.plan-actions').innerHTML = '<i>(執行中...)</i>';
                try {
                  const confirmRes = await fetch(`/api/chat/confirm/${CLIENT_ID}`, { method: 'POST' });
                  const confirmReader = confirmRes.body.getReader();
                  const confirmDecoder = new TextDecoder();
                  let confirmBuf = '';
                  const confirmSpan = document.createElement('span');
                  const confirmDiv = document.createElement('div');
                  confirmDiv.className = 'msg ai';
                  // Tool results go above, text goes below
                  const toolResultsContainer = document.createElement('div');
                  confirmDiv.appendChild(toolResultsContainer);
                  confirmDiv.appendChild(confirmSpan);
                  messagesEl.appendChild(confirmDiv);
                  let confirmText = '';

                  while (true) {
                    const { done: cDone, value: cVal } = await confirmReader.read();
                    if (cDone) break;
                    confirmBuf += confirmDecoder.decode(cVal, { stream: true });
                    const cLines = confirmBuf.split('\n');
                    confirmBuf = cLines.pop();
                    for (const cLine of cLines) {
                      if (!cLine.startsWith('data: ')) continue;
                      const cJson = cLine.slice(6).trim();
                      if (!cJson) continue;
                      try {
                        const cEvt = JSON.parse(cJson);
                        if (cEvt.type === 'tool_result') {
                          const r = cEvt.result;
                          if (r && r.error) {
                            const badge = document.createElement('div');
                            badge.style.cssText = 'font-size:11px;color:#f44336;margin:4px 0;padding:4px 8px;background:rgba(255,0,0,0.1);border-radius:6px;';
                            badge.textContent = `⚠️ ${cEvt.tool}: ${r.error.substring(0, 80)}`;
                            toolResultsContainer.appendChild(badge);
                          }
                          if (r && r.media) {
                            renderMediaInChat(toolResultsContainer, r.media);
                          }
                        } else if (cEvt.type === 'chunk') {
                          confirmText += cEvt.data;
                          confirmSpan.textContent = confirmText.replace(/\[emotion:\w+\]/g, '');
                        } else if (cEvt.type === 'done') {
                          if (!confirmText && cEvt.text) {
                            confirmText = cEvt.text;
                            confirmSpan.textContent = confirmText.replace(/\[emotion:\w+\]/g, '');
                          }
                          if (cEvt.emotion) setEmotion(cEvt.emotion);
                        }
                      } catch (ce) {}
                    }
                  }
                  activePlanCard.querySelector('.plan-actions').innerHTML = '<i>(已完成)</i>';
                } catch (ce) {
                  activePlanCard.querySelector('.plan-actions').innerHTML = '<i>(執行失敗)</i>';
                }
                scrollToBottom();
              };
              activePlanCard.querySelector('.btn-deny').onclick = async () => {
                activePlanCard.querySelectorAll('button').forEach(b => b.disabled = true);
                try {
                  const denyRes = await fetch(`/api/chat/deny/${CLIENT_ID}`, { method: 'POST' });
                  const denyData = await denyRes.json();
                  activePlanCard.querySelector('.plan-actions').textContent = denyData.text || '(Denied)';
                } catch (e) {
                  activePlanCard.querySelector('.plan-actions').textContent = '(Denied)';
                }
              };
              aiDiv.appendChild(activePlanCard);
              scrollToBottom();
              break;

            case 'tool_result':
              const r = evt.result;
              if (r && r.error) {
                const badge = document.createElement('div');
                badge.style.cssText = 'font-size:11px;color:#f44336;margin:4px 0;padding:4px 8px;background:rgba(255,0,0,0.1);border-radius:6px;';
                badge.textContent = `⚠️ ${evt.tool}: ${r.error.substring(0, 80)}`;
                aiDiv.insertBefore(badge, aiSpan);
              }
              if (r && r.media) {
                renderMediaInChat(aiDiv, r.media);
              }
              scrollToBottom();
              break;

            case 'error':
              addMessageObj('sys', `錯誤: ${evt.text}`, 'error');
              break;

            case 'done':
              removeTyping();
              if (!fullText && evt.text) {
                fullText = evt.text;
                aiSpan.textContent = fullText.replace(/\[emotion:\w+\]/g, '');
              }
              // Convert URLs in text to clickable links
              {
                const text = aiSpan.textContent;
                const urlRegex = /(https?:\/\/[^\s）\)]+)/g;
                if (urlRegex.test(text)) {
                  const parts = text.split(urlRegex);
                  aiSpan.textContent = '';
                  parts.forEach(part => {
                    if (part.match(/^https?:\/\//)) {
                      const a = document.createElement('a');
                      a.href = part;
                      a.textContent = part.length > 50 ? part.substring(0, 50) + '...' : part;
                      a.target = '_blank';
                      a.rel = 'noopener';
                      a.style.cssText = 'color:#69b4ff;text-decoration:underline;word-break:break-all;';
                      aiSpan.appendChild(a);
                    } else {
                      aiSpan.appendChild(document.createTextNode(part));
                    }
                  });
                }
              }
              if (evt.emotion) {
                setEmotion(evt.emotion);
                const tag = document.createElement('div');
                tag.className = 'emotion-tag';
                tag.textContent = evt.emotion;
                aiDiv.insertBefore(tag, aiSpan);
              }
              // Timing badge
              const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
              const ttfb = firstChunkTime ? ((firstChunkTime - startTime) / 1000).toFixed(1) : 'N/A';
              const timingDiv = document.createElement('div');
              timingDiv.className = 'timing-badge';
              timingDiv.textContent = `⏱️ 首字 ${ttfb}s · 總計 ${elapsed}s · ${fullText.length} 字`;
              aiDiv.appendChild(timingDiv);
              // TTS replay/stop button + Japanese drawer
              const ttsRow = document.createElement('div');
              ttsRow.style.cssText = 'display:flex;align-items:center;flex-wrap:wrap;margin-top:2px;';
              const ttsBtn = document.createElement('span');
              ttsBtn.className = 'tts-btn';
              ttsBtn.textContent = '\uD83D\uDD0A';
              ttsBtn.title = '播放 / 停止語音';
              ttsRow.appendChild(ttsBtn);

              const ttsLoading = document.createElement('span');
              ttsLoading.className = 'tts-loading';
              ttsLoading.textContent = '語音生成中';
              ttsLoading.style.display = 'none';
              ttsRow.appendChild(ttsLoading);

              const jaToggle = document.createElement('span');
              jaToggle.className = 'ja-toggle';
              jaToggle.textContent = '🇯🇵 日本語';
              jaToggle.title = '顯示語音日文原文';
              ttsRow.appendChild(jaToggle);
              aiDiv.appendChild(ttsRow);

              const jaDrawer = document.createElement('div');
              jaDrawer.className = 'ja-drawer';
              aiDiv.appendChild(jaDrawer);

              jaToggle.onclick = () => {
                jaDrawer.classList.toggle('open');
              };

              const ttsText = fullText;
              const ttsEmotion = evt.emotion || 'neutral';
              let cachedAudioUrl = null;
              let cachedJaText = null;
              let ttsGenerating = false;

              function replayAudio() {
                if (currentAudio) { currentAudio.pause(); currentAudio = null; }
                currentAudio = new Audio(cachedAudioUrl);
                currentAudio.play();
                isPlaying = true;
                ttsBtn.classList.add('playing');
                currentAudio.onended = () => { isPlaying = false; currentAudio = null; ttsBtn.classList.remove('playing'); };
              }

              async function doPlayTTS() {
                if (cachedAudioUrl) { replayAudio(); return; }
                if (ttsGenerating) return; // prevent duplicate
                ttsGenerating = true;
                ttsLoading.style.display = 'inline-block';
                ttsBtn.classList.add('playing');
                const result = await playTTS(ttsText, ttsEmotion);
                ttsLoading.style.display = 'none';
                ttsGenerating = false;
                if (result) {
                  cachedJaText = result;
                  jaDrawer.textContent = result;
                }
                if (currentAudio) {
                  cachedAudioUrl = currentAudio.src;
                }
                const checkEnd = setInterval(() => {
                  if (!isPlaying) { ttsBtn.classList.remove('playing'); clearInterval(checkEnd); }
                }, 300);
              }

              ttsBtn.onclick = () => {
                if (isPlaying && currentAudio) {
                  stopTTS();
                  ttsBtn.classList.remove('playing');
                } else {
                  doPlayTTS();
                }
              };

              showGreeting(aiSpan.textContent.substring(0, 60) + (aiSpan.textContent.length > 60 ? '...' : ''));
              // Auto-play TTS audio if enabled
              if (fullText && ttsEnabled) {
                doPlayTTS();
              }
              setTimeout(() => {
                setEmotion('neutral');
                if (animController) animController.play('idle');
              }, 4000);
              break;
          }
        } catch (e) { console.warn('SSE payload parse failed:', e); }
      }
    }
  } catch (err) {
    removeTyping();
    if (!fullText) aiSpan.textContent = '連線錯誤: ' + err.message;
    if (animController) animController.play('idle');
  }
  
  if (!fullText && !aiDiv.querySelector('.plan-card') && !aiDiv.querySelector('.tool-card')) {
     aiDiv.remove();
  }
  
  sendBtn.disabled = false;
  inputEl.focus();
}

  dashscope:         { base_url: 'https://dashscope-intl.aliyuncs.com/compatible-mode', model: 'qwen3-235b-a22b' },
  openrouter:        { base_url: 'https://openrouter.ai/api', model: 'qwen/qwen3.6-plus:free' },
  openai:            { base_url: 'https://api.openai.com', model: 'gpt-4o-mini' },
  openai_compatible: { base_url: '', model: '' },
};

const providerSelect = document.getElementById('provider-select');
const providerBaseUrl = document.getElementById('provider-base-url');
const providerModel = document.getElementById('provider-model');
const providerApiKey = document.getElementById('provider-api-key');
const providerStatus = document.getElementById('provider-status');

providerSelect.onchange = () => {
  const pv = providerSelect.value;
  const preset = providerPresets[pv];
  if (preset) {
    providerBaseUrl.value = preset.base_url;
  }
  // Load saved keys for this provider
  const saved = loadProviderKeys(pv);
  providerModel.value = saved.model || (preset ? preset.model : '');
  providerApiKey.value = saved.key;
  providerApiKey.placeholder = pv === 'ollama' ? '（本機不需要）' : (saved.key ? '已儲存 ✓' : 'sk-...');
};

// Load current provider on settings open
async function loadProviderSettings() {
  try {
    const res = await fetch('/api/config/provider');
    if (res.ok) {
      const data = await res.json();
      providerSelect.value = data.provider || 'ollama';
      providerBaseUrl.value = data.base_url || '';
      providerModel.value = data.model || '';
      providerApiKey.value = '';
      providerStatus.textContent = data.has_api_key ? '🔑 API Key 已設定' : '';
    }
  } catch (e) { console.error('Load provider failed', e); }
}

document.getElementById('save-provider-btn').onclick = async () => {
  const btn = document.getElementById('save-provider-btn');
  btn.disabled = true;
  btn.textContent = '套用中...';
  try {
    const res = await fetch('/api/config/provider', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        provider: providerSelect.value,
        base_url: providerBaseUrl.value,
        api_key: providerApiKey.value,
        model: providerModel.value,
      })
    });
    const data = await res.json();
    if (data.success) {
      btn.textContent = '已套用 ✓';
      providerStatus.textContent = '🔑 API Key 已設定';
      saveProviderKeys(providerSelect.value, providerApiKey.value, providerModel.value);
      showToast(`已切換到 ${data.provider} / ${data.model}`);
    } else {
      btn.textContent = '失敗 ✗';
      providerStatus.textContent = '❌ ' + (data.error || 'Unknown error');
    }
  } catch (e) {
    btn.textContent = '失敗 ✗';
    providerStatus.textContent = '❌ 連線失敗';
  }
  setTimeout(() => { btn.disabled = false; btn.textContent = '套用設定'; }, 2000);
};

// Per-provider key storage helpers
function saveProviderKeys(provider, key, model) {
  if (provider && key) localStorage.setItem('ai-wife-key-' + provider, key);
  if (provider && model) localStorage.setItem('ai-wife-model-' + provider, model);
}
function loadProviderKeys(provider) {
  return {
    key: localStorage.getItem('ai-wife-key-' + provider) || '',
    model: localStorage.getItem('ai-wife-model-' + provider) || CLOUD_DEFAULT_MODELS[provider] || '',
  };
}

// Fetch and populate model list for a provider
var _allModels = {}; // cache per provider
async function loadModelList(provider, selectEl, searchEl) {
  // Clear with DOM methods
  while (selectEl.firstChild) selectEl.removeChild(selectEl.firstChild);
  const loadingOpt = document.createElement('option');
  loadingOpt.value = '';
  loadingOpt.textContent = '載入中...';
  selectEl.appendChild(loadingOpt);
  try {
    const r = await fetch('/api/config/provider-models?provider=' + encodeURIComponent(provider));
    const data = await r.json();
    const models = data.models || [];
    _allModels[provider] = models;
    populateModelSelect(models, selectEl, '');
    const saved = loadProviderKeys(provider);
    if (saved.model) selectEl.value = saved.model;
  } catch (e) {
    while (selectEl.firstChild) selectEl.removeChild(selectEl.firstChild);
    const errOpt = document.createElement('option');
    errOpt.value = '';
    errOpt.textContent = '載入失敗';
    selectEl.appendChild(errOpt);
  }
}

function populateModelSelect(models, selectEl, filter) {
  const q = filter.toLowerCase();
  const filtered = q ? models.filter(m => m.id.toLowerCase().includes(q) || m.name.toLowerCase().includes(q)) : models;
  while (selectEl.firstChild) selectEl.removeChild(selectEl.firstChild);
  if (filtered.length === 0) {
    const noneOpt = document.createElement('option');
    noneOpt.value = '';
    noneOpt.textContent = '無匹配結果';
    selectEl.appendChild(noneOpt);
    return;
  }
  filtered.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id;
    const badge = m.free ? '🆓 ' : '';
    const ctx = m.context ? ' (' + Math.round(m.context/1024) + 'K)' : '';
    opt.textContent = badge + m.name + ctx;
    selectEl.appendChild(opt);
  });
}

function showToast(msg, duration = 3000) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

function setStatus(id, status, detail = '') {
  const el = document.getElementById(id);
  el.className = `status ${status}`;
  el.textContent = { ok: '✓', fail: '✗', pending: '?', testing: '…' }[status] || '?';
  const detailEl = document.getElementById(id + '-detail');
  if (detailEl && detail) detailEl.textContent = detail;
}

let welcomeAudioUrl = null;
let welcomeJaText = null;

async function pregenWelcomeTTS() {
  try {
    const resp = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: '老公～歡迎回來！今天想跟小愛聊什麼呢？',
        language: langSel.value || 'zh-TW',
        emotion: 'happy',
      }),
    });
    if (resp.ok) {
      const data = await resp.json();
      // Pre-fetch the audio blob
      const audioResp = await fetch(data.audio_url);
      const blob = await audioResp.blob();
      welcomeAudioUrl = URL.createObjectURL(blob);
      welcomeJaText = data.ja_text || '';
      console.log('Welcome TTS pre-generated');
    }
  } catch (e) {
    console.warn('Welcome TTS pregen failed:', e);
  }
}

async function runTests() {
  testBtn.disabled = true;
  testBtn.textContent = '測試中...';

  const tests = ['llm', 'tts', 'stt', 'skills'];
  tests.forEach(t => setStatus('test-' + t, 'testing'));

  // Apply provider setting BEFORE running tests
  const prov = setupProvider.value;
  if (prov !== 'ollama') {
    const ak = setupApiKey.value.trim();
    const cm = setupCloudModel.value || document.getElementById('setup-cloud-model-search').value.trim();
    if (!ak) { showToast('請先輸入 API Key'); testBtn.disabled = false; testBtn.textContent = '測試連線'; return; }
    if (!cm) { showToast('請先輸入模型名稱'); testBtn.disabled = false; testBtn.textContent = '測試連線'; return; }
    try {
      const pr = await fetch('/api/config/provider', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          provider: prov, base_url: CLOUD_BASE_URLS[prov], api_key: ak, model: cm,
          fallback_provider: document.getElementById('setup-fallback-provider').value,
          fallback_base_url: CLOUD_BASE_URLS[document.getElementById('setup-fallback-provider').value] || '',
          fallback_api_key: document.getElementById('setup-fallback-key').value.trim(),
          fallback_model: document.getElementById('setup-fallback-model').value || document.getElementById('setup-fallback-model-search').value.trim(),
        }),
      });
      const pd = await pr.json();
      if (!pd.success) { showToast('Provider 設定失敗: ' + pd.error); testBtn.disabled = false; testBtn.textContent = '測試連線'; return; }
    } catch (e) { showToast('連線失敗'); testBtn.disabled = false; testBtn.textContent = '測試連線'; return; }
  } else {
    // Ensure we're on Ollama with the selected local model
    try {
      await fetch('/api/config/provider', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ provider: 'ollama', base_url: 'http://localhost:9090', api_key: '', model: setupModel.value }),
      });
    } catch (e) {}
  }

  try {
    const res = await fetch('/api/health/test');
    const data = await res.json();

    // LLM
    if (data.llm?.ok) {
      const pLabel = data.llm.provider === 'ollama' ? '🖥️' : '☁️';
      setStatus('test-llm', 'ok', `${pLabel} ${data.llm.model} (${data.llm.latency_ms}ms)`);
    } else {
      setStatus('test-llm', 'fail', data.llm?.error?.substring(0, 80) || 'Unknown');
    }

    // TTS
    if (data.tts?.ok) {
      setStatus('test-tts', 'ok', data.tts.provider);
    } else {
      setStatus('test-tts', 'fail', data.tts?.error || 'Unknown');
    }

    // STT
    if (data.stt?.ok) {
      setStatus('test-stt', 'ok', data.stt.provider);
    } else {
      setStatus('test-stt', 'fail', data.stt?.error || 'Unknown');
    }

    // Skills
    if (data.skills?.ok) {
      setStatus('test-skills', 'ok', `${data.skills.tool_count} tools`);
    } else {
      setStatus('test-skills', 'fail', data.skills?.error || 'Unknown');
    }

    // Enable enter button only after welcome TTS is ready
    const llmOk = data.llm?.ok;
    if (llmOk) {
      if (ttsEnabled) {
        enterBtn.textContent = '語音準備中...';
        enterBtn.disabled = true;
        await pregenWelcomeTTS();
        enterBtn.textContent = '進入 💕';
        enterBtn.disabled = false;
      }
      enterBtn.classList.add('ready');
    }
  } catch (e) {
    tests.forEach(t => setStatus('test-' + t, 'fail', '連線失敗'));
  }

  testBtn.disabled = false;
  testBtn.textContent = '重新測試';
}

enterBtn.addEventListener('click', async () => {
  const provider = setupProvider.value;
  const isCloud = provider !== 'ollama';

  // Save preferences
  localStorage.setItem('ai-wife-provider', provider);
  localStorage.setItem('ai-wife-lang', setupLang.value);
  langSel.value = setupLang.value;

  if (isCloud) {
    const cloudModel = setupCloudModel.value || document.getElementById('setup-cloud-model-search').value.trim();
    const apiKey = setupApiKey.value.trim();
    if (!apiKey) { showToast('請輸入 API Key'); return; }
    if (!cloudModel) { showToast('請選擇模型'); return; }

    localStorage.setItem('ai-wife-api-key', apiKey);
    localStorage.setItem('ai-wife-cloud-model', cloudModel);
    saveProviderKeys(provider, apiKey, cloudModel);
    // Save fallback
    const _fbp = document.getElementById('setup-fallback-provider').value;
    const _fbk = document.getElementById('setup-fallback-key').value.trim();
    const _fbm = document.getElementById('setup-fallback-model').value || document.getElementById('setup-fallback-model-search').value.trim();
    if (_fbp) {
      localStorage.setItem('ai-wife-fb-provider', _fbp);
      localStorage.setItem('ai-wife-fb-key', _fbk);
      localStorage.setItem('ai-wife-fb-model', _fbm);
      saveProviderKeys(_fbp, _fbk, _fbm);
    }

    enterBtn.textContent = '連線中...';
    enterBtn.disabled = true;
    try {
      const res = await fetch('/api/config/provider', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          provider: provider,
          base_url: CLOUD_BASE_URLS[provider],
          api_key: apiKey,
          model: cloudModel,
          fallback_provider: document.getElementById('setup-fallback-provider').value,
          fallback_base_url: CLOUD_BASE_URLS[document.getElementById('setup-fallback-provider').value] || '',
          fallback_api_key: document.getElementById('setup-fallback-key').value.trim(),
          fallback_model: document.getElementById('setup-fallback-model').value || document.getElementById('setup-fallback-model-search').value.trim(),
        }),
      });
      const data = await res.json();
      if (!data.success) {
        showToast('設定失敗: ' + (data.error || ''));
        enterBtn.textContent = '進入 💕';
        enterBtn.disabled = false;
        return;
      }
    } catch (e) {
      showToast('連線失敗');
      enterBtn.textContent = '進入 💕';
      enterBtn.disabled = false;
      return;
    }
  } else {
    localStorage.setItem('ai-wife-model', setupModel.value);
  }

  setupScreen.classList.add('hidden');
  enterBtn.textContent = '進入 💕';
  enterBtn.disabled = false;
  showToast('歡迎回來 💕');
  updateModelDisplay();
  // Play welcome TTS (user just clicked, so autoplay is allowed)
  if (welcomeAudioUrl && ttsEnabled) {
    setTimeout(() => {
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      currentAudio = new Audio(welcomeAudioUrl);
      currentAudio.play().catch(() => {});
      isPlaying = true;
      currentAudio.onended = () => { isPlaying = false; currentAudio = null; };
    }, 500);
  }
});

const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
const lbRichtext = document.getElementById('lightbox-richtext');
const lbNav = document.getElementById('lightbox-nav');
var lbItems = [];
var lbIndex = 0;

function openLightbox(items, index) {
  lbItems = items; lbIndex = index || 0;
  showLightboxItem();
  lightbox.classList.add('open');
}
function showLightboxItem() {
  const item = lbItems[lbIndex];
  lbImg.style.display = 'none';
  lbRichtext.style.display = 'none';
  lbRichtext.textContent = '';
  // Remove any previous video/iframe
  lightbox.querySelectorAll('.lb-video').forEach(el => el.remove());

  if (item.type === 'image') {
    lbImg.src = item.url;
    lbImg.style.display = 'block';
    lbImg.style.transform = 'scale(1)';
  } else if (item.type === 'video') {
    const vid = document.createElement('video');
    vid.className = 'lb-video';
    vid.src = item.url;
    vid.controls = true;
    vid.autoplay = true;
    vid.style.cssText = 'max-width:90%;max-height:90%;border-radius:8px;';
    lightbox.insertBefore(vid, lbNav);
  } else if (item.type === 'iframe') {
    const iframe = document.createElement('iframe');
    iframe.className = 'lb-video';
    iframe.src = item.url;
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    iframe.allowFullscreen = true;
    iframe.style.cssText = 'width:80vw;height:70vh;max-width:1200px;border:none;border-radius:8px;';
    lightbox.insertBefore(iframe, lbNav);
  } else if (item.type === 'richtext') {
    if (item.html && item.html.includes('<')) {
      const iframe = document.createElement('iframe');
      iframe.sandbox = 'allow-same-origin';
      iframe.style.cssText = 'width:100%;height:80vh;border:none;background:white;border-radius:8px;';
      lbRichtext.appendChild(iframe);
      iframe.srcdoc = item.html;
    } else {
      const pre = document.createElement('pre');
      pre.style.cssText = 'white-space:pre-wrap;';
      pre.textContent = item.html || '';
      lbRichtext.appendChild(pre);
    }
    lbRichtext.style.display = 'block';
  }
  lbNav.textContent = lbItems.length > 1 ? (lbIndex+1)+' / '+lbItems.length : '';
  document.getElementById('lb-prev').style.display = lbItems.length > 1 ? 'block' : 'none';
  document.getElementById('lb-next').style.display = lbItems.length > 1 ? 'block' : 'none';
}
document.getElementById('lightbox-close').onclick = () => lightbox.classList.remove('open');
lightbox.onclick = (e) => { if (e.target === lightbox) lightbox.classList.remove('open'); };
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') lightbox.classList.remove('open'); });
document.getElementById('lb-prev').onclick = (e) => { e.stopPropagation(); lbIndex = (lbIndex-1+lbItems.length)%lbItems.length; showLightboxItem(); };
document.getElementById('lb-next').onclick = (e) => { e.stopPropagation(); lbIndex = (lbIndex+1)%lbItems.length; showLightboxItem(); };
lbImg.addEventListener('wheel', (e) => {
  e.preventDefault();
  const cur = parseFloat(lbImg.style.transform.replace('scale(','').replace(')','') || '1');
  const ns = Math.max(0.5, Math.min(5, cur + (e.deltaY > 0 ? -0.1 : 0.1)));
  lbImg.style.transform = 'scale('+ns+')';
});

function renderMediaInChat(container, media) {
  if (!media || !Array.isArray(media)) return;
  media.forEach((item, idx) => {
    if (item.type === 'image') {
      const img = document.createElement('img');
      img.className = 'media-thumb';
      img.src = item.url;
      img.alt = item.alt || '';
      img.onclick = () => openLightbox(media, idx);
      container.appendChild(img);
    } else if (item.type === 'video') {
      const video = document.createElement('video');
      video.className = 'media-thumb';
      video.src = item.url;
      video.controls = true;
      video.style.maxWidth = '300px';
      video.style.borderRadius = '8px';
      container.appendChild(video);
    } else if (item.type === 'iframe') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'cursor:pointer;max-width:300px;margin:6px 0;position:relative;';
      if (item.thumbnail) {
        const thumb = document.createElement('img');
        thumb.className = 'media-thumb';
        thumb.src = item.thumbnail;
        thumb.alt = item.title || '';
        wrapper.appendChild(thumb);
        const play = document.createElement('div');
        play.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;color:white;text-shadow:0 2px 8px rgba(0,0,0,0.8);';
        play.textContent = '▶';
        wrapper.appendChild(play);
      } else {
        const label = document.createElement('div');
        label.className = 'content-preview';
        label.textContent = '▶ ' + (item.title || 'Video');
        wrapper.appendChild(label);
      }
      wrapper.onclick = () => openLightbox(media, idx);
      container.appendChild(wrapper);
    } else if (item.type === 'richtext') {
      const card = document.createElement('div');
      card.className = 'content-preview';
      const title = document.createElement('div');
      title.className = 'content-preview-title';
      title.textContent = item.title || 'Content';
      card.appendChild(title);
      const snippet = document.createElement('div');
      snippet.className = 'content-preview-snippet';
      snippet.textContent = (item.html || '').replace(/<[^>]*>/g, '').substring(0, 80) + '...';
      card.appendChild(snippet);
      card.onclick = () => openLightbox(media, idx);
      container.appendChild(card);
    }
  });
}
</script>
</body>
</html>
