<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Wife</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif;
    display: flex; flex-direction: column;
  }

  #vrm-container {
    flex: 1; position: relative; min-height: 0;
  }
  #vrm-container canvas { display: block; width: 100%; height: 100%; }
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #FF69B4; font-size: 16px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  #loading .spinner {
    width: 40px; height: 40px; border: 3px solid rgba(255,105,180,0.3);
    border-top-color: #FF69B4; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading.hidden { display: none; }
  #error {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #ff4444; font-size: 14px; text-align: center;
    display: none; padding: 20px;
  }

  #greeting {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(255,105,180,0.15); border: 1px solid rgba(255,105,180,0.4);
    border-radius: 16px; padding: 10px 18px; color: #FFB6C1;
    font-size: 14px; max-width: 90%; text-align: center;
    backdrop-filter: blur(8px); display: none;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  #top-bar {
    position: absolute; top: 12px; left: 12px;
    display: flex; gap: 8px; z-index: 10;
  }
  select {
    background: rgba(15, 52, 96, 0.8); color: white; border: 1px solid #FF69B4;
    padding: 6px 10px; border-radius: 8px; outline: none; backdrop-filter: blur(4px);
  }

  #chat-panel {
    height: 45vh; min-height: 200px; display: flex; flex-direction: column;
    background: #16213e; border-top: 1px solid #FF69B4; position: relative;
  }
  #messages {
    flex: 1; overflow-y: auto; padding: 12px; min-height: 0;
    display: flex; flex-direction: column; gap: 8px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-thumb { background: #FF69B4; border-radius: 3px; }

  /* Resize handle */
  #chat-resize-handle {
    height: 6px; cursor: ns-resize; background: transparent; position: absolute;
    top: -3px; left: 0; right: 0; z-index: 5;
  }
  #chat-resize-handle:hover { background: rgba(255,105,180,0.3); }

  /* Scroll to bottom button */
  #scroll-bottom-btn {
    position: absolute; bottom: 60px; right: 16px; z-index: 10;
    width: 36px; height: 36px; border-radius: 50%;
    background: #FF69B4; border: none; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  #scroll-bottom-btn svg { width: 20px; height: 20px; fill: white; }
  #scroll-bottom-btn.visible { display: flex; }

  /* Timing badge */
  .timing-badge {
    font-size: 10px; color: #888; text-align: right; margin-top: 2px;
  }

  .msg { max-width: 80%; padding: 8px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: #0f3460; color: #eee; border-bottom-right-radius: 4px; }
  .msg.ai { align-self: flex-start; background: #2a1f3d; color: #FFB6C1; border-bottom-left-radius: 4px; border: 1px solid rgba(255,105,180,0.2); }
  .msg.ai .emotion-tag { font-size: 11px; color: #FF69B4; margin-bottom: 2px; }
  .msg.ai .timing-badge { font-size: 10px; color: #888; margin-top: 4px; }
  .tts-btn { display: inline-block; cursor: pointer; font-size: 16px; margin-left: 6px; opacity: 0.6; transition: opacity 0.2s; user-select: none; }
  .tts-btn:hover { opacity: 1; }
  .tts-btn.playing { opacity: 1; animation: pulse 1s infinite; }
  .ja-toggle { display: inline-block; cursor: pointer; font-size: 12px; margin-left: 6px; opacity: 0.5; user-select: none; color: #FF69B4; }
  .ja-toggle:hover { opacity: 1; }
  .ja-drawer { display: none; margin-top: 4px; padding: 6px 10px; background: rgba(255,105,180,0.08); border-left: 2px solid #FF69B4; border-radius: 4px; font-size: 13px; color: #ddd; line-height: 1.5; }
  .media-thumb { max-width: 300px; border-radius: 8px; cursor: pointer; margin: 6px 0; transition: opacity 0.2s; }
  .media-thumb:hover { opacity: 0.85; }
  .content-preview { display: inline-block; cursor: pointer; margin: 6px 0; padding: 8px 12px; background: rgba(255,105,180,0.08); border-left: 2px solid #FF69B4; border-radius: 6px; max-width: 300px; }
  .content-preview:hover { background: rgba(255,105,180,0.15); }
  .content-preview-title { font-weight: bold; font-size: 13px; color: #FF69B4; }
  .content-preview-snippet { font-size: 12px; color: #aaa; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 9999; justify-content: center; align-items: center; }
  #lightbox.open { display: flex; }
  #lightbox-close { position: absolute; top: 16px; right: 24px; font-size: 32px; color: white; cursor: pointer; z-index: 10000; }
  #lightbox-img { max-width: 90%; max-height: 90%; object-fit: contain; transition: transform 0.2s; }
  #lightbox-richtext { max-width: 800px; max-height: 85vh; overflow-y: auto; background: #1a1a2e; color: #eee; padding: 24px; border-radius: 12px; font-size: 14px; line-height: 1.7; }
  #lightbox-nav { position: absolute; bottom: 20px; color: white; font-size: 14px; }
  .lb-arrow { position: absolute; top: 50%; font-size: 36px; color: white; cursor: pointer; padding: 12px; user-select: none; }
  .lb-arrow:hover { color: #FF69B4; }
  #lb-prev { left: 16px; }
  #lb-next { right: 16px; }
  .ja-drawer.open { display: block; }
  .tts-loading { display: inline-block; font-size: 11px; color: #FF69B4; margin-left: 6px; }
  .tts-loading::after { content: ''; animation: dots 1.2s steps(4) infinite; }
  @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
  #tts-toggle { cursor: pointer; font-size: 13px; padding: 2px 8px; border-radius: 10px; border: 1px solid #555; background: none; color: #aaa; margin-left: 6px; }
  #tts-toggle.on { color: #FF69B4; border-color: #FF69B4; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .typing-indicator { display: inline-flex; gap: 4px; padding: 4px 0; }
  .typing-indicator span { width: 6px; height: 6px; border-radius: 50%; background: #FF69B4; opacity: 0.4; animation: blink 1.4s infinite both; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.4} 40%{opacity:1} }
  .msg.notice { align-self: center; background: rgba(255,105,180,0.1); color: #FF69B4; font-size: 12px; border: 1px dashed rgba(255,105,180,0.3); max-width: 90%; text-align: center; }
  .msg.error { align-self: center; background: rgba(255,0,0,0.1); color: #ff6b6b; font-size: 12px; }

  .plan-card {
    background: #0f3460; border: 1px solid #4CAF50; border-radius: 8px; padding: 10px; margin-top: 6px; font-size: 13px; color: #eee;
  }
  .plan-actions { display: flex; gap: 8px; margin-top: 8px; }
  .plan-actions button { padding: 4px 12px; border: none; border-radius: 4px; cursor: pointer; color: white; }
  .btn-confirm { background: #4CAF50; }
  .btn-deny { background: #f44336; }

  .tool-card {
    background: #1a1a2e; border: 1px solid #666; border-radius: 8px; padding: 0; margin-top: 6px; font-size: 12px; overflow: hidden;
  }
  .tool-header { padding: 8px; background: rgba(255,255,255,0.05); cursor: pointer; color: #ccc; }
  .tool-body { padding: 8px; display: none; color: #aaa; border-top: 1px solid #444; white-space: pre-wrap; word-break: break-all; max-height: 150px; overflow-y: auto;}
  .tool-card.expanded .tool-body { display: block; }

  #input-bar {
    display: flex; gap: 8px; padding: 10px 12px; background: #0f3460; align-items: center;
  }
  #settings-btn { background: none; border: none; font-size: 20px; cursor: pointer; opacity: 0.8; }
  #settings-btn:hover { opacity: 1; }
  #input-bar input {
    flex: 1; padding: 10px 14px; border-radius: 20px;
    border: 1px solid rgba(255,105,180,0.4); background: #1a1a2e;
    color: #eee; font-size: 14px; outline: none;
  }
  #input-bar input:focus { border-color: #FF69B4; }
  #input-bar button#send-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: #FF69B4; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #input-bar button#send-btn svg { width: 20px; height: 20px; fill: white; }

  /* Modal */
  #settings-modal {
    position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  #settings-modal.hidden { display: none; }
  .modal-content {
    background: #16213e; width: 90%; max-width: 500px; height: 80%; border-radius: 12px;
    border: 1px solid #FF69B4; display: flex; flex-direction: column; overflow: hidden;
  }
  .modal-header { padding: 16px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
  .modal-header h2 { font-size: 18px; color: #FF69B4; }
  #close-settings { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }

  /* Startup Screen */
  #setup-screen {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  #setup-screen.hidden {
    opacity: 0; pointer-events: none; transform: scale(1.05);
  }
  .setup-card {
    background: rgba(22, 33, 62, 0.95); border: 1px solid rgba(255,105,180,0.3);
    border-radius: 16px; padding: 32px; width: 90%; max-width: 420px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .setup-title {
    text-align: center; font-size: 24px; color: #FF69B4; margin-bottom: 4px;
  }
  .setup-subtitle {
    text-align: center; font-size: 13px; color: #888; margin-bottom: 24px;
  }
  .setup-field { margin-bottom: 16px; }
  .setup-field label {
    display: block; font-size: 13px; color: #FFB6C1; margin-bottom: 6px;
  }
  .setup-field select, .setup-field input {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    border: 1px solid rgba(255,105,180,0.3); background: #0f3460;
    color: #eee; font-size: 14px; outline: none;
  }
  .setup-field select:focus, .setup-field input:focus {
    border-color: #FF69B4;
  }
  .test-btn {
    width: 100%; padding: 12px; border-radius: 10px; border: none;
    background: #FF69B4; color: white; font-size: 15px; cursor: pointer;
    font-weight: bold; margin-bottom: 16px;
  }
  .test-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .test-btn:hover:not(:disabled) { background: #e55a9b; }
  .test-results { margin-bottom: 16px; }
  .test-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 0;
    font-size: 13px; color: #ccc;
  }
  .test-item .status {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: bold;
  }
  .test-item .status.ok { background: #4CAF50; color: white; }
  .test-item .status.fail { background: #f44336; color: white; }
  .test-item .status.pending { background: #555; color: #aaa; }
  .test-item .status.testing { background: #FF69B4; color: white; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .enter-btn {
    width: 100%; padding: 14px; border-radius: 10px; border: none;
    background: #4CAF50; color: white; font-size: 16px; cursor: pointer;
    font-weight: bold; opacity: 0.3; pointer-events: none;
    transition: opacity 0.3s;
  }
  .enter-btn.ready { opacity: 1; pointer-events: auto; }
  .enter-btn:hover { background: #45a049; }
  .setup-loading {
    text-align: center; padding: 20px; color: #FF69B4;
  }
  .setup-loading .spinner {
    width: 32px; height: 32px; border: 3px solid rgba(255,105,180,0.3);
    border-top-color: #FF69B4; border-radius: 50%; margin: 0 auto 12px;
    animation: spin 0.8s linear infinite;
  }

  /* Toast notification */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(22, 33, 62, 0.95); border: 1px solid #FF69B4;
    border-radius: 10px; padding: 10px 20px; color: #FFB6C1;
    font-size: 14px; z-index: 2000; opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  #toast.show { opacity: 1; }

  /* Model switch loading overlay */
  #model-switch-overlay {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.7); z-index: 999; display: none;
    align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  }
  #model-switch-overlay.show { display: flex; }
  #model-switch-overlay span { color: #FF69B4; font-size: 14px; }
  .tabs { display: flex; background: #0f3460; }
  .tab-btn { flex: 1; padding: 10px; border: none; background: none; color: #aaa; cursor: pointer; }
  .tab-btn.active { color: #FF69B4; border-bottom: 2px solid #FF69B4; background: rgba(255,105,180,0.1); }
  .tab-body { flex: 1; padding: 16px; overflow-y: auto; display: none; }
  .tab-body.active { display: block; }
  
  #soul-editor { width: 100%; height: 85%; background: #1a1a2e; color: #eee; border: 1px solid #555; padding: 8px; border-radius: 6px; font-family: monospace; resize: none; }
  #save-soul-btn { margin-top: 10px; width: 100%; padding: 10px; background: #FF69B4; color: white; border: none; border-radius: 6px; cursor: pointer; }
  
  .memory-item, .hb-item { padding: 10px; background: #1a1a2e; margin-bottom: 8px; border-radius: 6px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: flex-start; }
  .hb-item .info { flex: 1; }
  .hb-item .cron { color: #FF69B4; font-family: monospace; font-size: 12px; }
  .hb-item .action { font-size: 14px; margin-top: 4px; color: #eee; }
  .hb-item button, .memory-item button { background: #f44336; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .hb-item button.btn-toggle { background: #555; }
  .hb-item button.btn-toggle.enabled { background: #4CAF50; }
</style>
</head>
<body>

<div id="vrm-container">
  <div id="top-bar">
    <select id="mode-selector">
      <option value="auto">自動</option>
      <option value="chat">聊天</option>
      <option value="assist">協助</option>
    </select>
    <select id="lang-selector">
      <option value="zh-TW">繁體中文</option>
      <option value="ja">日本語</option>
      <option value="en">English</option>
    </select>
    <button id="tts-toggle" class="on" title="語音開關">🔊</button>
    <select id="model-selector" title="切換模型">
      <optgroup label="本機 Ollama">
        <option value="smart7">Qwen 2.5 7B</option>
        <option value="smart9">Qwen 3.5 9B</option>
        <option value="ultra">Qwen 3.5 27B</option>
      </optgroup>
      <optgroup label="☁️ 雲端">
        <option value="cloud:qwen3-235b-a22b">Qwen3 235B MoE</option>
        <option value="cloud:qwen3-32b">Qwen3 32B</option>
        <option value="cloud:qwen-plus">Qwen Plus</option>
        <option value="cloud:qwen-turbo">Qwen Turbo</option>
      </optgroup>
    </select>
  </div>
  <div id="loading"><div class="spinner"></div><span>Loading model...</span></div>
  <div id="error"></div>
  <div id="greeting"></div>
</div>

<div id="chat-panel">
  <div id="chat-resize-handle"></div>
  <div id="messages"></div>
  <button id="scroll-bottom-btn" title="Scroll to bottom">
    <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
  </button>
  <div id="input-bar">
    <button id="settings-btn" title="Settings">⚙️</button>
    <input type="text" id="chat-input" placeholder="輸入訊息..." autocomplete="off">
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-title">🌸 AI Wife</div>
    <div class="setup-subtitle">選擇模型並測試連線</div>
    <div class="setup-field">
      <label>運行方式</label>
      <select id="setup-provider">
        <option value="ollama">🖥️ 本機 Ollama</option>
        <option value="dashscope">☁️ Alibaba Cloud / DashScope</option>
        <option value="openrouter">☁️ OpenRouter（無審查）</option>
        <option value="openai">☁️ OpenAI</option>
      </select>
    </div>
    <div class="setup-field" id="setup-local-model-field">
      <label>本機模型</label>
      <select id="setup-model">
        <option value="smart7">Qwen 2.5 7B（快速）</option>
        <option value="smart9">Qwen 3.5 9B（平衡）</option>
        <option value="ultra">Qwen 3.5 27B（高品質）</option>
      </select>
    </div>
    <div id="setup-cloud-fields" style="display:none;">
      <div class="setup-field">
        <label>雲端模型</label>
        <input id="setup-cloud-model" type="text" list="model-suggestions" placeholder="qwen3-235b-a22b" style="width:100%;padding:8px;background:#1a1a2e;color:#eee;border:1px solid #555;border-radius:6px;box-sizing:border-box;">
      </div>
      <div class="setup-field">
        <label>API Key</label>
        <input id="setup-api-key" type="password" placeholder="sk-..." style="width:100%;padding:8px;background:#1a1a2e;color:#eee;border:1px solid #555;border-radius:6px;box-sizing:border-box;">
      </div>
    </div>
    <div id="setup-fallback-fields" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid #333;">
      <label style="color:#FF69B4;font-size:13px;font-weight:bold;">⚡ Fallback API（內容被攔截時自動切換）</label>
      <select id="setup-fallback-provider" style="width:100%;padding:8px;margin:8px 0;background:#1a1a2e;color:#eee;border:1px solid #555;border-radius:6px;">
        <option value="">不使用 Fallback</option>
        <option value="openrouter">OpenRouter（無審查）</option>
        <option value="dashscope">DashScope</option>
        <option value="openai">OpenAI</option>
      </select>
      <input id="setup-fallback-model" type="text" list="model-suggestions" placeholder="qwen/qwen3.6-plus:free" style="width:100%;padding:8px;margin:4px 0;background:#1a1a2e;color:#eee;border:1px solid #555;border-radius:6px;box-sizing:border-box;">
      <input id="setup-fallback-key" type="password" placeholder="Fallback API Key" style="width:100%;padding:8px;margin:4px 0;background:#1a1a2e;color:#eee;border:1px solid #555;border-radius:6px;box-sizing:border-box;">
    </div>
    <div class="setup-field">
      <label>語言</label>
      <select id="setup-lang">
        <option value="zh-TW">繁體中文</option>
        <option value="ja">日本語</option>
        <option value="en">English</option>
      </select>
    </div>
    <button class="test-btn" id="test-connection-btn">測試連線</button>
    <div class="test-results" id="test-results">
      <div class="test-item"><span class="status pending" id="test-llm">?</span><span>LLM 模型</span><span id="test-llm-detail" style="margin-left:auto;color:#888;font-size:11px;"></span></div>
      <div class="test-item"><span class="status pending" id="test-tts">?</span><span>TTS 語音合成</span><span id="test-tts-detail" style="margin-left:auto;color:#888;font-size:11px;"></span></div>
      <div class="test-item"><span class="status pending" id="test-stt">?</span><span>STT 語音辨識</span><span id="test-stt-detail" style="margin-left:auto;color:#888;font-size:11px;"></span></div>
      <div class="test-item"><span class="status pending" id="test-skills">?</span><span>Skills 工具</span><span id="test-skills-detail" style="margin-left:auto;color:#888;font-size:11px;"></span></div>
    </div>
    <button class="enter-btn" id="enter-btn">進入 💕</button>
  </div>
</div>

<div id="toast"></div>

<div id="lightbox">
  <span id="lightbox-close">&times;</span>
  <span class="lb-arrow" id="lb-prev">&#10094;</span>
  <span class="lb-arrow" id="lb-next">&#10095;</span>
  <img id="lightbox-img" style="display:none;">
  <div id="lightbox-richtext" style="display:none;"></div>
  <div id="lightbox-nav"></div>
</div>
<div id="model-switch-overlay"><div class="spinner"></div><span>切換模型中...</span></div>

<div id="settings-modal" class="hidden">

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/OrbitControls.js';
import { GLTFLoader } from 'three/addons/GLTFLoader.js';
import { FBXLoader } from 'three/addons/FBXLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

// ── Mixamo→VRM Bone Mapping ────────────────────────────────────────
const MIXAMO_VRM_MAP = {
  mixamorigHips: 'hips', mixamorigSpine: 'spine', mixamorigSpine1: 'chest',
  mixamorigSpine2: 'upperChest', mixamorigNeck: 'neck', mixamorigHead: 'head',
  mixamorigLeftShoulder: 'leftShoulder', mixamorigLeftArm: 'leftUpperArm',
  mixamorigLeftForeArm: 'leftLowerArm', mixamorigLeftHand: 'leftHand',
  mixamorigLeftHandThumb1: 'leftThumbMetacarpal', mixamorigLeftHandThumb2: 'leftThumbProximal',
  mixamorigLeftHandThumb3: 'leftThumbDistal', mixamorigLeftHandIndex1: 'leftIndexProximal',
  mixamorigLeftHandIndex2: 'leftIndexIntermediate', mixamorigLeftHandIndex3: 'leftIndexDistal',
  mixamorigLeftHandMiddle1: 'leftMiddleProximal', mixamorigLeftHandMiddle2: 'leftMiddleIntermediate',
  mixamorigLeftHandMiddle3: 'leftMiddleDistal', mixamorigLeftHandRing1: 'leftRingProximal',
  mixamorigLeftHandRing2: 'leftRingIntermediate', mixamorigLeftHandRing3: 'leftRingDistal',
  mixamorigLeftHandPinky1: 'leftLittleProximal', mixamorigLeftHandPinky2: 'leftLittleIntermediate',
  mixamorigLeftHandPinky3: 'leftLittleDistal',
  mixamorigRightShoulder: 'rightShoulder', mixamorigRightArm: 'rightUpperArm',
  mixamorigRightForeArm: 'rightLowerArm', mixamorigRightHand: 'rightHand',
  mixamorigRightHandThumb1: 'rightThumbMetacarpal', mixamorigRightHandThumb2: 'rightThumbProximal',
  mixamorigRightHandThumb3: 'rightThumbDistal', mixamorigRightHandIndex1: 'rightIndexProximal',
  mixamorigRightHandIndex2: 'rightIndexIntermediate', mixamorigRightHandIndex3: 'rightIndexDistal',
  mixamorigRightHandMiddle1: 'rightMiddleProximal', mixamorigRightHandMiddle2: 'rightMiddleIntermediate',
  mixamorigRightHandMiddle3: 'rightMiddleDistal', mixamorigRightHandRing1: 'rightRingProximal',
  mixamorigRightHandRing2: 'rightRingIntermediate', mixamorigRightHandRing3: 'rightRingDistal',
  mixamorigRightHandPinky1: 'rightLittleProximal', mixamorigRightHandPinky2: 'rightLittleIntermediate',
  mixamorigRightHandPinky3: 'rightLittleDistal',
  mixamorigLeftUpLeg: 'leftUpperLeg', mixamorigLeftLeg: 'leftLowerLeg',
  mixamorigLeftFoot: 'leftFoot', mixamorigLeftToeBase: 'leftToes',
  mixamorigRightUpLeg: 'rightUpperLeg', mixamorigRightLeg: 'rightLowerLeg',
  mixamorigRightFoot: 'rightFoot', mixamorigRightToeBase: 'rightToes',
};

function retargetMixamoClip(clip, fbxRoot, vrm, name) {
  const tracks = [];
  const restRotInv = new THREE.Quaternion();
  const parentRestWorldRot = new THREE.Quaternion();
  const q = new THREE.Quaternion();

  const hipsNode = fbxRoot.getObjectByName('mixamorigHips');
  const motionHipsY = hipsNode ? hipsNode.position.y : 1;
  const vrmHipsY = vrm.humanoid.normalizedRestPose.hips?.position?.[1] ?? 1;
  const hipsScale = vrmHipsY / motionHipsY;

  for (const track of clip.tracks) {
    const [mixName, prop] = track.name.split('.');
    const vrmBone = MIXAMO_VRM_MAP[mixName];
    if (!vrmBone) continue;

    const vrmNode = vrm.humanoid.getNormalizedBoneNode(vrmBone);
    if (!vrmNode) continue;

    const mixNode = fbxRoot.getObjectByName(mixName);
    if (!mixNode?.parent) continue;

    mixNode.getWorldQuaternion(restRotInv).invert();
    mixNode.parent.getWorldQuaternion(parentRestWorldRot);

    if (track instanceof THREE.QuaternionKeyframeTrack) {
      const values = new Float32Array(track.values.length);
      for (let i = 0; i < track.values.length; i += 4) {
        q.fromArray(track.values, i)
          .premultiply(parentRestWorldRot)
          .multiply(restRotInv);
        q.toArray(values, i);
      }
      tracks.push(new THREE.QuaternionKeyframeTrack(
        `${vrmNode.name}.${prop}`, track.times, values
      ));
    } else if (track instanceof THREE.VectorKeyframeTrack) {
      const values = new Float32Array(track.values.length);
      for (let i = 0; i < track.values.length; i++) values[i] = track.values[i] * hipsScale;
      tracks.push(new THREE.VectorKeyframeTrack(
        `${vrmNode.name}.${prop}`, track.times, values
      ));
    }
  }
  return new THREE.AnimationClip(name, clip.duration, tracks);
}

// ── Animation Controller ───────────────────────────────────────────
const CROSSFADE = 0.3;

class AnimController {
  constructor(vrm) {
    this.vrm = vrm;
    this.mixer = new THREE.AnimationMixer(vrm.scene);
    this.actions = new Map();
    this.entries = new Map();
    this.actionToId = new Map();
    this.currentAction = null;
    this.current = '';
    this.defaultId = '';

    this.mixer.addEventListener('finished', (e) => {
      const id = this.actionToId.get(e.action);
      if (!id) return;
      const entry = this.entries.get(id);
      const fallback = entry?.autoReturnTo;
      if (fallback && fallback !== this.current) this.play(fallback);
      else if (this.defaultId) this.play(this.defaultId);
    });
  }

  async loadAll(entries) {
    const fbxLoader = new FBXLoader();
    for (const entry of entries) {
      try {
        const url = `./static/animations/${entry.file}`;
        const fbx = await fbxLoader.loadAsync(url);
        const rawClip = fbx.animations.find(c => c.tracks.length > 0);
        if (!rawClip) continue;

        const clip = retargetMixamoClip(rawClip, fbx, this.vrm, entry.id);
        const action = this.mixer.clipAction(clip);
        const loop = entry.loop ?? true;
        action.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, loop ? Infinity : 1);
        if (!loop) action.clampWhenFinished = true;

        this.entries.set(entry.id, entry);
        this.actions.set(entry.id, action);
        this.actionToId.set(action, entry.id);
      } catch (err) {
        console.warn(`Failed to load animation ${entry.id}:`, err);
      }
    }
    if (entries.length > 0) this.defaultId = entries[0].id;
  }

  play(id) {
    const next = this.actions.get(id);
    if (!next || id === this.current) return;

    const entry = this.entries.get(id);
    const loop = entry?.loop ?? true;
    next.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, loop ? Infinity : 1);
    next.clampWhenFinished = !loop;

    if (this.currentAction) this.currentAction.fadeOut(CROSSFADE);
    next.reset().fadeIn(CROSSFADE).play();
    this.currentAction = next;
    this.current = id;
  }

  update(delta) { this.mixer.update(delta); }
}

// ── Scene Setup ────────────────────────────────────────────────────
const container = document.getElementById('vrm-container');
const loadingEl = document.getElementById('loading');
const errorEl = document.getElementById('error');

let scene, camera, renderer, controls, clock;
let currentVrm = null;
let animController = null;
let nextBlinkTime = 0, blinkEndTime = 0;

function initScene() {
  clock = new THREE.Clock();
  scene = new THREE.Scene();

  const aspect = container.clientWidth / container.clientHeight;
  camera = new THREE.PerspectiveCamera(30, aspect, 0.1, 100);
  camera.position.set(0, 1.3, 2.5);

  renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  container.insertBefore(renderer.domElement, container.firstChild);

  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(1, 2, 1);
  scene.add(dirLight);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 1.0, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  controls.minDistance = 1;
  controls.maxDistance = 5;
  controls.update();

  window.addEventListener('resize', () => {
    const w = container.clientWidth, h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
}

async function loadModel(url) {
  loadingEl.classList.remove('hidden');
  if (currentVrm) { scene.remove(currentVrm.scene); currentVrm = null; animController = null; }

  const loader = new GLTFLoader();
  loader.register(p => new VRMLoaderPlugin(p));

  try {
    const gltf = await loader.loadAsync(url);
    const vrm = gltf.userData.vrm;
    if (!vrm) { showError('No VRM data found'); return; }
    VRMUtils.rotateVRM0(vrm);
    currentVrm = vrm;
    scene.add(vrm.scene);

    // Auto-center camera
    const box = new THREE.Box3().setFromObject(vrm.scene);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    controls.target.set(center.x, center.y, center.z);
    camera.position.set(center.x, center.y + 0.1, center.z + size.y * 1.2);
    controls.update();

    loadingEl.querySelector('span').textContent = 'Loading animations...';

    // Load animations from registry
    try {
      const res = await fetch('./static/animations/registry.json');
      const entries = await res.json();
      animController = new AnimController(vrm);
      await animController.loadAll(entries);
      animController.play('idle');
      console.log('Animations loaded:', [...animController.actions.keys()]);
    } catch (err) {
      console.warn('Animation load failed, using procedural idle:', err);
    }

    loadingEl.classList.add('hidden');
    nextBlinkTime = clock.getElapsedTime() + 1;
  } catch (err) {
    showError('Failed to load: ' + (err.message || err));
  }
}

function showError(msg) {
  loadingEl.classList.add('hidden');
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
}

const lookAtTarget = new THREE.Vector3(0, 1.3, 10);

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  if (currentVrm) {
    // Use FBX animation if available, else fallback to procedural breathing
    if (animController) {
      animController.update(delta);
    } else if (currentVrm.humanoid) {
      const t = clock.getElapsedTime();
      const breath = Math.sin(t * 0.8) * 0.04;
      const sway = Math.sin(t * 0.3) * 0.015;
      const chest = currentVrm.humanoid.getNormalizedBoneNode('chest');
      const spine = currentVrm.humanoid.getNormalizedBoneNode('spine');
      const head = currentVrm.humanoid.getNormalizedBoneNode('head');
      if (chest) { chest.rotation.x = breath; chest.rotation.z = Math.sin(t * 0.25) * 0.005; }
      if (spine) { spine.rotation.x = breath * 0.6; spine.rotation.z = sway; }
      if (head) { head.rotation.x = Math.sin(t * 0.5) * 0.02; head.rotation.z = Math.sin(t * 0.4) * 0.01; }
    }

    // Blink
    if (currentVrm.expressionManager) {
      const t = clock.getElapsedTime();
      if (t >= blinkEndTime && t >= nextBlinkTime) {
        currentVrm.expressionManager.setValue('blink', 1.0);
        blinkEndTime = t + 0.15;
        nextBlinkTime = t + 2 + Math.random() * 4;
      } else if (t >= blinkEndTime) {
        currentVrm.expressionManager.setValue('blink', 0);
      }
    }

    if (currentVrm.lookAt) currentVrm.lookAt.lookAt(lookAtTarget);
    if (currentVrm.expressionManager) currentVrm.expressionManager.update();
    currentVrm.update(delta);
  }

  controls.update();
  renderer.render(scene, camera);
}

// ── Expressions & Emotion-to-Animation ─────────────────────────────
const emotionToExpression = {
  happy: 'happy', sad: 'sad', angry: 'angry',
  surprised: 'surprised', relaxed: 'relaxed', neutral: 'neutral'
};

const emotionToAnim = {
  happy: 'wave', surprised: 'wave', neutral: 'idle',
  sad: 'idle', angry: 'idle', relaxed: 'idle',
  thinking: 'think'
};

function setEmotion(emotion) {
  if (!currentVrm || !currentVrm.expressionManager) return;
  // Reset all expressions
  for (const expr of currentVrm.expressionManager.expressions) {
    currentVrm.expressionManager.setValue(expr.expressionName, 0);
  }
  const name = emotionToExpression[emotion] || 'neutral';
  if (name !== 'neutral') {
    currentVrm.expressionManager.setValue(name, 1.0);
  }
  // Play matching animation
  if (animController) {
    const anim = emotionToAnim[emotion] || 'idle';
    if (animController.actions.has(anim)) {
      animController.play(anim);
    }
  }
}

initScene();
animate();
loadModel('./static/models/character.vrm');

// ── Core Utils ───────────────────────────────────────────────────────
function uuidv4() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}
const CLIENT_ID = uuidv4();

// ── Audio / TTS Playback ─────────────────────────────────────────────
let currentAudio = null;
let isPlaying = false;
let ttsEnabled = localStorage.getItem('ai-wife-tts') !== 'off';

const ttsToggleBtn = document.getElementById('tts-toggle');
ttsToggleBtn.className = ttsEnabled ? 'on' : '';
ttsToggleBtn.textContent = ttsEnabled ? '🔊' : '🔇';
ttsToggleBtn.onclick = () => {
  ttsEnabled = !ttsEnabled;
  localStorage.setItem('ai-wife-tts', ttsEnabled ? 'on' : 'off');
  ttsToggleBtn.className = ttsEnabled ? 'on' : '';
  ttsToggleBtn.textContent = ttsEnabled ? '🔊' : '🔇';
  if (!ttsEnabled && currentAudio) { stopTTS(); }
};

async function playTTS(text, emotion = 'neutral') {
  try {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
    const cleanText = text.replace(/\[emotion:\w+\]/g, '').trim();
    if (!cleanText) return null;

    const resp = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: cleanText, language: langSel.value, emotion }),
    });
    if (!resp.ok) return null;

    const data = await resp.json();
    const audioResp = await fetch(data.audio_url);
    const blob = await audioResp.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.play();
    isPlaying = true;
    currentAudio.onended = () => { isPlaying = false; currentAudio = null; };
    return data.ja_text || null;
  } catch (e) {
    console.warn('TTS playback failed:', e);
    return null;
  }
}

function stopTTS() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
    isPlaying = false;
  }
}

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('chat-input');

const greetingEl = document.getElementById('greeting');

// Auto-scroll tracking
let userScrolledUp = false;
messagesEl.addEventListener('scroll', () => {

scrollBottomBtn.addEventListener('click', () => {

function scrollToBottom() {

    messagesEl.scrollTop = messagesEl.scrollHeight;

// Chat panel resize
const resizeHandle = document.getElementById('chat-resize-handle');
let isResizing = false;
resizeHandle.addEventListener('mousedown', (e) => {
  isResizing = true;
  document.body.style.cursor = 'ns-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', (e) => {

function addMessageObj(type, content, className = '') {
  const div = document.createElement('div');
  div.className = `msg ${className}`;

function showGreeting(text) {

// ── SSE Consumption ──────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  sendBtn.disabled = true;

  addMessageObj('user', `<span>${text}</span>`, 'user');

  if (animController && animController.actions.has('think')) {
    animController.play('think');
  }

  const aiDiv = document.createElement('div');
  aiDiv.className = 'msg ai';
  const typingEl = document.createElement('div');
  typingEl.className = 'typing-indicator';
  typingEl.innerHTML = '<span></span><span></span><span></span>';
  aiDiv.appendChild(typingEl);
  const aiSpan = document.createElement('span');
  aiSpan.style.display = 'none';
  aiDiv.appendChild(aiSpan);
  messagesEl.appendChild(aiDiv);
  scrollToBottom();

  let typingRemoved = false;
  function removeTyping() {
    if (!typingRemoved) { typingEl.remove(); aiSpan.style.display = ''; typingRemoved = true; }
  }

  // Track state
  let fullText = '';
  let activePlanCard = null;
  const startTime = performance.now();
  let firstChunkTime = null;

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        language: langSel.value,
        mode_override: modeSel.value === 'auto' ? null : modeSel.value,
        client_id: CLIENT_ID
      })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // incomplete line back to buffer

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const jsonStr = line.slice(6).trim();
        if (!jsonStr) continue;

        try {
          const evt = JSON.parse(jsonStr);

          switch (evt.type) {
            case 'mode_change':
              addMessageObj('sys', `⚙️ 模式: ${evt.mode === 'assist' ? '協助' : '聊天'}`, 'notice');
              break;
            
            case 'notice':
              removeTyping();
              addMessageObj('sys', evt.text, 'notice');
              break;

            case 'chunk':
              removeTyping();
              if (!firstChunkTime) firstChunkTime = performance.now();
              fullText += evt.data;
              aiSpan.textContent = fullText.replace(/\[emotion:\w+\]/g, '');
              scrollToBottom();
              break;

            case 'plan':
              removeTyping();
              activePlanCard = document.createElement('div');
              activePlanCard.className = 'plan-card';
              activePlanCard.innerHTML = `
                <div><strong>提議計畫:</strong><br>${(evt.description || '').replace(/\n/g, '<br>')}</div>
                <div class="plan-actions">
                  <button class="btn-confirm">✅ 授權執行</button>
                  <button class="btn-deny">❌ 拒絕</button>
                </div>
              `;
              activePlanCard.querySelector('.btn-confirm').onclick = async () => {
                activePlanCard.querySelectorAll('button').forEach(b => b.disabled = true);
                activePlanCard.querySelector('.plan-actions').innerHTML = '<i>(執行中...)</i>';
                try {
                  const confirmRes = await fetch(`/api/chat/confirm/${CLIENT_ID}`, { method: 'POST' });
                  const confirmReader = confirmRes.body.getReader();
                  const confirmDecoder = new TextDecoder();
                  let confirmBuf = '';
                  const confirmSpan = document.createElement('span');
                  const confirmDiv = document.createElement('div');
                  confirmDiv.className = 'msg ai';
                  // Tool results go above, text goes below
                  const toolResultsContainer = document.createElement('div');
                  confirmDiv.appendChild(toolResultsContainer);
                  confirmDiv.appendChild(confirmSpan);
                  messagesEl.appendChild(confirmDiv);
                  let confirmText = '';

                  while (true) {
                    const { done: cDone, value: cVal } = await confirmReader.read();
                    if (cDone) break;
                    confirmBuf += confirmDecoder.decode(cVal, { stream: true });
                    const cLines = confirmBuf.split('\n');
                    confirmBuf = cLines.pop();
                    for (const cLine of cLines) {
                      if (!cLine.startsWith('data: ')) continue;
                      const cJson = cLine.slice(6).trim();
                      if (!cJson) continue;
                      try {
                        const cEvt = JSON.parse(cJson);
                        if (cEvt.type === 'tool_result') {
                          const r = cEvt.result;
                          if (r && r.error) {
                            const badge = document.createElement('div');
                            badge.style.cssText = 'font-size:11px;color:#f44336;margin:4px 0;padding:4px 8px;background:rgba(255,0,0,0.1);border-radius:6px;';
                            badge.textContent = `⚠️ ${cEvt.tool}: ${r.error.substring(0, 80)}`;
                            toolResultsContainer.appendChild(badge);
                          }
                          if (r && r.media) {
                            renderMediaInChat(toolResultsContainer, r.media);
                          }
                        } else if (cEvt.type === 'chunk') {
                          confirmText += cEvt.data;
                          confirmSpan.textContent = confirmText.replace(/\[emotion:\w+\]/g, '');
                        } else if (cEvt.type === 'done') {
                          if (!confirmText && cEvt.text) {
                            confirmText = cEvt.text;
                            confirmSpan.textContent = confirmText.replace(/\[emotion:\w+\]/g, '');
                          }
                          if (cEvt.emotion) setEmotion(cEvt.emotion);
                        }
                      } catch (ce) {}
                    }
                  }
                  activePlanCard.querySelector('.plan-actions').innerHTML = '<i>(已完成)</i>';
                } catch (ce) {
                  activePlanCard.querySelector('.plan-actions').innerHTML = '<i>(執行失敗)</i>';
                }
                scrollToBottom();
              };
              activePlanCard.querySelector('.btn-deny').onclick = async () => {
                activePlanCard.querySelectorAll('button').forEach(b => b.disabled = true);
                try {
                  const denyRes = await fetch(`/api/chat/deny/${CLIENT_ID}`, { method: 'POST' });
                  const denyData = await denyRes.json();
                  activePlanCard.querySelector('.plan-actions').textContent = denyData.text || '(Denied)';
                } catch (e) {
                  activePlanCard.querySelector('.plan-actions').textContent = '(Denied)';
                }
              };
              aiDiv.appendChild(activePlanCard);
              scrollToBottom();
              break;

            case 'tool_result':
              const r = evt.result;
              if (r && r.error) {
                const badge = document.createElement('div');
                badge.style.cssText = 'font-size:11px;color:#f44336;margin:4px 0;padding:4px 8px;background:rgba(255,0,0,0.1);border-radius:6px;';
                badge.textContent = `⚠️ ${evt.tool}: ${r.error.substring(0, 80)}`;
                aiDiv.insertBefore(badge, aiSpan);
              }
              if (r && r.media) {
                renderMediaInChat(aiDiv, r.media);
              }
              scrollToBottom();
              break;

            case 'error':
              addMessageObj('sys', `錯誤: ${evt.text}`, 'error');
              break;

            case 'done':
              removeTyping();
              if (!fullText && evt.text) {
                fullText = evt.text;
                aiSpan.textContent = fullText.replace(/\[emotion:\w+\]/g, '');
              }
              if (evt.emotion) {
                setEmotion(evt.emotion);
                const tag = document.createElement('div');
                tag.className = 'emotion-tag';
                tag.textContent = evt.emotion;
                aiDiv.insertBefore(tag, aiSpan);
              }
              // Timing badge
              const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
              const ttfb = firstChunkTime ? ((firstChunkTime - startTime) / 1000).toFixed(1) : 'N/A';
              const timingDiv = document.createElement('div');
              timingDiv.className = 'timing-badge';
              timingDiv.textContent = `⏱️ 首字 ${ttfb}s · 總計 ${elapsed}s · ${fullText.length} 字`;
              aiDiv.appendChild(timingDiv);
              // TTS replay/stop button + Japanese drawer
              const ttsRow = document.createElement('div');
              ttsRow.style.cssText = 'display:flex;align-items:center;flex-wrap:wrap;margin-top:2px;';
              const ttsBtn = document.createElement('span');
              ttsBtn.className = 'tts-btn';
              ttsBtn.textContent = '\uD83D\uDD0A';
              ttsBtn.title = '播放 / 停止語音';
              ttsRow.appendChild(ttsBtn);

              const ttsLoading = document.createElement('span');
              ttsLoading.className = 'tts-loading';
              ttsLoading.textContent = '語音生成中';
              ttsLoading.style.display = 'none';
              ttsRow.appendChild(ttsLoading);

              const jaToggle = document.createElement('span');
              jaToggle.className = 'ja-toggle';
              jaToggle.textContent = '🇯🇵 日本語';
              jaToggle.title = '顯示語音日文原文';
              ttsRow.appendChild(jaToggle);
              aiDiv.appendChild(ttsRow);

              const jaDrawer = document.createElement('div');
              jaDrawer.className = 'ja-drawer';
              aiDiv.appendChild(jaDrawer);

              jaToggle.onclick = () => {
                jaDrawer.classList.toggle('open');
              };

              const ttsText = fullText;
              const ttsEmotion = evt.emotion || 'neutral';
              let cachedAudioUrl = null;
              let cachedJaText = null;
              let ttsGenerating = false;

              function replayAudio() {
                if (currentAudio) { currentAudio.pause(); currentAudio = null; }
                currentAudio = new Audio(cachedAudioUrl);
                currentAudio.play();
                isPlaying = true;
                ttsBtn.classList.add('playing');
                currentAudio.onended = () => { isPlaying = false; currentAudio = null; ttsBtn.classList.remove('playing'); };
              }

              async function doPlayTTS() {
                if (cachedAudioUrl) { replayAudio(); return; }
                if (ttsGenerating) return; // prevent duplicate
                ttsGenerating = true;
                ttsLoading.style.display = 'inline-block';
                ttsBtn.classList.add('playing');
                const result = await playTTS(ttsText, ttsEmotion);
                ttsLoading.style.display = 'none';
                ttsGenerating = false;
                if (result) {
                  cachedJaText = result;
                  jaDrawer.textContent = result;
                }
                if (currentAudio) {
                  cachedAudioUrl = currentAudio.src;
                }
                const checkEnd = setInterval(() => {
                  if (!isPlaying) { ttsBtn.classList.remove('playing'); clearInterval(checkEnd); }
                }, 300);
              }

              ttsBtn.onclick = () => {
                if (isPlaying && currentAudio) {
                  stopTTS();
                  ttsBtn.classList.remove('playing');
                } else {
                  doPlayTTS();
                }
              };

              showGreeting(aiSpan.textContent.substring(0, 60) + (aiSpan.textContent.length > 60 ? '...' : ''));
              // Auto-play TTS audio if enabled
              if (fullText && ttsEnabled) {
                doPlayTTS();
              }
              setTimeout(() => {
                setEmotion('neutral');
                if (animController) animController.play('idle');
              }, 4000);
              break;
          }
        } catch (e) { console.warn('SSE payload parse failed:', e); }
      }
    }
  } catch (err) {
    removeTyping();
    if (!fullText) aiSpan.textContent = '連線錯誤: ' + err.message;
    if (animController) animController.play('idle');
  }
  
  if (!fullText && !aiDiv.querySelector('.plan-card') && !aiDiv.querySelector('.tool-card')) {
     aiDiv.remove();
  }
  
  sendBtn.disabled = false;
  inputEl.focus();
}

async function runTests() {
  testBtn.disabled = true;
  testBtn.textContent = '測試中...';

  const tests = ['llm', 'tts', 'stt', 'skills'];
  tests.forEach(t => setStatus('test-' + t, 'testing'));

  // Apply provider setting BEFORE running tests
  const prov = setupProvider.value;
  if (prov !== 'ollama') {
    const ak = setupApiKey.value.trim();
    const cm = setupCloudModel.value.trim();
    if (!ak) { showToast('請先輸入 API Key'); testBtn.disabled = false; testBtn.textContent = '測試連線'; return; }
    if (!cm) { showToast('請先輸入模型名稱'); testBtn.disabled = false; testBtn.textContent = '測試連線'; return; }
    try {
      const pr = await fetch('/api/config/provider', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          provider: prov, base_url: CLOUD_BASE_URLS[prov], api_key: ak, model: cm,
          fallback_provider: document.getElementById('setup-fallback-provider').value,
          fallback_base_url: CLOUD_BASE_URLS[document.getElementById('setup-fallback-provider').value] || '',
          fallback_api_key: document.getElementById('setup-fallback-key').value.trim(),
          fallback_model: document.getElementById('setup-fallback-model').value.trim(),
        }),
      });
      const pd = await pr.json();
      if (!pd.success) { showToast('Provider 設定失敗: ' + pd.error); testBtn.disabled = false; testBtn.textContent = '測試連線'; return; }
    } catch (e) { showToast('連線失敗'); testBtn.disabled = false; testBtn.textContent = '測試連線'; return; }
  } else {
    // Ensure we're on Ollama with the selected local model
    try {
      await fetch('/api/config/provider', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ provider: 'ollama', base_url: 'http://localhost:9090', api_key: '', model: setupModel.value }),
      });
    } catch (e) {}
  }

  try {
    const res = await fetch('/api/health/test');
    const data = await res.json();

    // LLM
    if (data.llm?.ok) {
      const pLabel = data.llm.provider === 'ollama' ? '🖥️' : '☁️';
      setStatus('test-llm', 'ok', `${pLabel} ${data.llm.model} (${data.llm.latency_ms}ms)`);
    } else {
      setStatus('test-llm', 'fail', data.llm?.error?.substring(0, 80) || 'Unknown');
    }

    // TTS
    if (data.tts?.ok) {
      setStatus('test-tts', 'ok', data.tts.provider);
    } else {
      setStatus('test-tts', 'fail', data.tts?.error || 'Unknown');
    }

    // STT
    if (data.stt?.ok) {
      setStatus('test-stt', 'ok', data.stt.provider);
    } else {
      setStatus('test-stt', 'fail', data.stt?.error || 'Unknown');
    }

    // Skills
    if (data.skills?.ok) {
      setStatus('test-skills', 'ok', `${data.skills.tool_count} tools`);
    } else {
      setStatus('test-skills', 'fail', data.skills?.error || 'Unknown');
    }

    // Enable enter button only after welcome TTS is ready
    const llmOk = data.llm?.ok;
    if (llmOk) {
      if (ttsEnabled) {
        enterBtn.textContent = '語音準備中...';
        enterBtn.disabled = true;
        await pregenWelcomeTTS();
        enterBtn.textContent = '進入 💕';
        enterBtn.disabled = false;
      }
      enterBtn.classList.add('ready');
    }
  } catch (e) {
    tests.forEach(t => setStatus('test-' + t, 'fail', '連線失敗'));
  }

  testBtn.disabled = false;
  testBtn.textContent = '重新測試';
}

testBtn.addEventListener('click', runTests);

enterBtn.addEventListener('click', async () => {
  const provider = setupProvider.value;
  const isCloud = provider !== 'ollama';

  // Save preferences
  localStorage.setItem('ai-wife-provider', provider);
  localStorage.setItem('ai-wife-lang', setupLang.value);
  langSel.value = setupLang.value;

  if (isCloud) {
    const cloudModel = setupCloudModel.value.trim();
    const apiKey = setupApiKey.value.trim();
    if (!apiKey) { showToast('請輸入 API Key'); return; }
    if (!cloudModel) { showToast('請輸入模型名稱'); return; }

    localStorage.setItem('ai-wife-api-key', apiKey);
    localStorage.setItem('ai-wife-cloud-model', cloudModel);
    saveProviderKeys(provider, apiKey, cloudModel);
    // Save fallback
    const _fbp = document.getElementById('setup-fallback-provider').value;
    const _fbk = document.getElementById('setup-fallback-key').value.trim();
    const _fbm = document.getElementById('setup-fallback-model').value.trim();
    if (_fbp) {
      localStorage.setItem('ai-wife-fb-provider', _fbp);
      localStorage.setItem('ai-wife-fb-key', _fbk);
      localStorage.setItem('ai-wife-fb-model', _fbm);
      saveProviderKeys(_fbp, _fbk, _fbm);
    }

    enterBtn.textContent = '連線中...';
    enterBtn.disabled = true;
    try {
      const res = await fetch('/api/config/provider', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          provider: provider,
          base_url: CLOUD_BASE_URLS[provider],
          api_key: apiKey,
          model: cloudModel,
        }),
      });
      const data = await res.json();
      if (!data.success) {
        showToast('設定失敗: ' + (data.error || ''));
        enterBtn.textContent = '進入 💕';
        enterBtn.disabled = false;
        return;
      }
      document.getElementById('model-selector').value = 'cloud:' + cloudModel;
    } catch (e) {
      showToast('連線失敗');
      enterBtn.textContent = '進入 💕';
      enterBtn.disabled = false;
      return;
    }
  } else {
    localStorage.setItem('ai-wife-model', setupModel.value);
    document.getElementById('model-selector').value = setupModel.value;
  }

  setupScreen.classList.add('hidden');
  enterBtn.textContent = '進入 💕';
  enterBtn.disabled = false;
  showToast('歡迎回來 💕');
  // Play welcome TTS (user just clicked, so autoplay is allowed)
  if (welcomeAudioUrl && ttsEnabled) {
    setTimeout(() => {
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      currentAudio = new Audio(welcomeAudioUrl);
      currentAudio.play().catch(() => {});
      isPlaying = true;
      currentAudio.onended = () => { isPlaying = false; currentAudio = null; };
    }, 500);
  }
});

// Load saved preferences
const savedModel = localStorage.getItem('ai-wife-model');
const savedLang = localStorage.getItem('ai-wife-lang');
if (savedModel) setupModel.value = savedModel;
if (savedLang) {
  setupLang.value = savedLang;
  langSel.value = savedLang;
}
// Restore cloud model in top selector
if (savedProvider && savedProvider !== 'ollama' && savedCloudModel) {
  const cloudVal = 'cloud:' + savedCloudModel;
  // Add option if not in list
  if (!modelSelector.querySelector(`option[value="${cloudVal}"]`)) {
    const opt = document.createElement('option');
    opt.value = cloudVal;
    opt.textContent = '☁️ ' + savedCloudModel;
    modelSelector.querySelector('optgroup:last-child').appendChild(opt);
  }
  modelSelector.value = cloudVal;
}
// Restore fallback
const _sfbp = localStorage.getItem('ai-wife-fb-provider');
const _sfbk = localStorage.getItem('ai-wife-fb-key');
const _sfbm = localStorage.getItem('ai-wife-fb-model');
if (_sfbp) {
  document.getElementById('setup-fallback-provider').value = _sfbp;
  if (_sfbk) document.getElementById('setup-fallback-key').value = _sfbk;
  if (_sfbm) document.getElementById('setup-fallback-model').value = _sfbm;
}

// ── Model Selector ──────────────────────────────────────────────────
const modelSelector = document.getElementById('model-selector');
modelSelector.addEventListener('change', async () => {
  const val = modelSelector.value;
  modelOverlay.classList.add('show');
  try {
    if (val.startsWith('cloud:')) {
      const cloudModel = val.replace('cloud:', '');
      const savedKey = localStorage.getItem('ai-wife-api-key') || '';
      const savedProv = localStorage.getItem('ai-wife-provider') || 'dashscope';
      if (!savedKey) {
        showToast('請先在設定頁輸入 API Key');
        modelOverlay.classList.remove('show');
        return;
      }
      const res = await fetch('/api/config/provider', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          provider: savedProv,
          base_url: CLOUD_BASE_URLS[savedProv],
          api_key: savedKey,
          model: cloudModel,
        }),
      });
      const data = await res.json();
      showToast(data.success ? `已切換至 ☁️ ${cloudModel}` : '切換失敗: ' + data.error);
    } else {
      // Switch back to Ollama local
      const res = await fetch('/api/config/provider', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          provider: 'ollama',
          base_url: 'http://localhost:9090',
          api_key: '',
          model: val,
        }),
      });
      await res.json();
      const res2 = await fetch('/api/config/model', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: val }),
      });
      const data = await res2.json();
      showToast(data.success ? `已切換至 🖥️ ${data.model}` : '切換失敗');
    }
  } catch (e) {
    showToast('切換失敗: ' + e.message);
  }
  modelOverlay.classList.remove('show');
});

// ── Return to Setup from Settings ───────────────────────────────────
// Add a "回到起始畫面" button in settings
const settingsTabs = document.querySelector('.tabs');
const returnBtn = document.createElement('button');
returnBtn.className = 'tab-btn';
returnBtn.textContent = '⚙️ 系統';
returnBtn.onclick = () => {
  settingsModal.classList.add('hidden');
  setupScreen.classList.remove('hidden');
  enterBtn.classList.remove('ready');
  ['llm','tts','stt','skills'].forEach(t => setStatus('test-' + t, 'pending'));
};
settingsTabs.appendChild(returnBtn);

// Auto-run tests on setup screen show
const observer = new MutationObserver((mutations) => {
  mutations.forEach((m) => {
    if (m.attributeName === 'class' && !setupScreen.classList.contains('hidden')) {
      ['llm','tts','stt','skills'].forEach(t => setStatus('test-' + t, 'pending'));
      enterBtn.classList.remove('ready');
    }
  });
});
observer.observe(setupScreen, { attributes: true });

// ── Auto-enter if previously completed ──────────────────────────────
if (savedModel && savedLang) {
  setupScreen.classList.add('hidden');
}

setTimeout(() => {
  showGreeting('老公～歡迎回來！今天想跟小愛聊什麼呢？');
  if (animController && animController.actions.has('wave')) {
    animController.play('wave');
    setTimeout(() => { if (animController) animController.play('idle'); }, 3000);
  }
}, 2000);
// ── Lightbox ─────────────────────────────────────────────────────────
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
const lbRichtext = document.getElementById('lightbox-richtext');
const lbNav = document.getElementById('lightbox-nav');
let lbItems = [];
let lbIndex = 0;

function openLightbox(items, index) {
  lbItems = items; lbIndex = index || 0;
  showLightboxItem();
  lightbox.classList.add('open');
}
function showLightboxItem() {
  const item = lbItems[lbIndex];
  lbImg.style.display = 'none';
  lbRichtext.style.display = 'none';
  lbRichtext.textContent = '';
  if (item.type === 'image') {
    lbImg.src = item.url;
    lbImg.style.display = 'block';
    lbImg.style.transform = 'scale(1)';
  } else if (item.type === 'richtext') {
    if (item.html && item.html.includes('<')) {
      const iframe = document.createElement('iframe');
      iframe.sandbox = 'allow-same-origin';
      iframe.style.cssText = 'width:100%;height:80vh;border:none;background:white;border-radius:8px;';
      lbRichtext.appendChild(iframe);
      iframe.srcdoc = item.html;
    } else {
      const pre = document.createElement('pre');
      pre.style.cssText = 'white-space:pre-wrap;';
      pre.textContent = item.html || '';
      lbRichtext.appendChild(pre);
    }
    lbRichtext.style.display = 'block';
  }
  lbNav.textContent = lbItems.length > 1 ? (lbIndex+1)+' / '+lbItems.length : '';
  document.getElementById('lb-prev').style.display = lbItems.length > 1 ? 'block' : 'none';
  document.getElementById('lb-next').style.display = lbItems.length > 1 ? 'block' : 'none';
}
document.getElementById('lightbox-close').onclick = () => lightbox.classList.remove('open');
lightbox.onclick = (e) => { if (e.target === lightbox) lightbox.classList.remove('open'); };
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') lightbox.classList.remove('open'); });
document.getElementById('lb-prev').onclick = (e) => { e.stopPropagation(); lbIndex = (lbIndex-1+lbItems.length)%lbItems.length; showLightboxItem(); };
document.getElementById('lb-next').onclick = (e) => { e.stopPropagation(); lbIndex = (lbIndex+1)%lbItems.length; showLightboxItem(); };
lbImg.addEventListener('wheel', (e) => {
  e.preventDefault();
  const cur = parseFloat(lbImg.style.transform.replace('scale(','').replace(')','') || '1');
  const ns = Math.max(0.5, Math.min(5, cur + (e.deltaY > 0 ? -0.1 : 0.1)));
  lbImg.style.transform = 'scale('+ns+')';
});

function renderMediaInChat(container, media) {
  if (!media || !Array.isArray(media)) return;
  media.forEach((item, idx) => {
    if (item.type === 'image') {
      const img = document.createElement('img');
      img.className = 'media-thumb';
      img.src = item.url;
      img.alt = item.alt || '';
      img.onclick = () => openLightbox(media, idx);
      container.appendChild(img);
    } else if (item.type === 'richtext') {
      const card = document.createElement('div');
      card.className = 'content-preview';
      const title = document.createElement('div');
      title.className = 'content-preview-title';
      title.textContent = item.title || 'Content';
      card.appendChild(title);
      const snippet = document.createElement('div');
      snippet.className = 'content-preview-snippet';
      snippet.textContent = (item.html || '').replace(/<[^>]*>/g, '').substring(0, 80) + '...';
      card.appendChild(snippet);
      card.onclick = () => openLightbox(media, idx);
      container.appendChild(card);
    }
  });
}
